<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>⚓ Hormuz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at 50% 20%,#091428 0%,#040208 80%);overflow:hidden;width:100vw;height:100vh;font-family:'Fredoka One',cursive}
#gc{position:fixed;inset:0;z-index:1}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;z-index:5;pointer-events:none;background:linear-gradient(to bottom,rgba(5,2,20,0.85),transparent)}
.ui-left{display:flex;flex-direction:column;align-items:flex-start}
.ui-right{display:flex;flex-direction:column;align-items:flex-end}
.ui-label{font-size:9px;color:#a78bca;letter-spacing:2px;text-transform:uppercase;font-family:'Fredoka One',cursive}
.ui-val{font-size:17px;font-family:'Bangers',cursive;letter-spacing:2px;color:#FFD700}
.ui-score{font-size:32px;font-family:'Bangers',cursive;letter-spacing:4px;color:#FFD700;text-shadow:0 0 18px rgba(255,200,0,0.7),0 0 35px rgba(255,150,0,0.3);line-height:1}
.ui-level{font-size:22px;font-family:'Bangers',cursive;letter-spacing:2px;color:#cc88ff;text-shadow:0 0 14px rgba(180,80,255,0.7)}
.ui-lives{display:flex;align-items:center;gap:6px;background:rgba(255,30,30,0.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,60,60,0.25)}
.ui-heart{font-size:24px;filter:drop-shadow(0 0 8px rgba(255,60,60,1));line-height:1;animation:heartbeat 1.2s ease-in-out infinite}
@keyframes heartbeat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.ui-clock{font-size:18px;font-family:'Bangers',cursive;letter-spacing:2px;color:#88ccff;text-shadow:0 0 8px rgba(100,180,255,0.6)}
.ui-lives-count{font-size:26px;font-family:'Bangers',cursive;color:#ff4444;letter-spacing:2px;text-shadow:0 0 12px rgba(255,60,60,0.8),0 0 25px rgba(255,30,30,0.4)}
#msg{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:62px;color:#fff;text-shadow:0 0 40px #fff,0 0 80px rgba(255,255,255,0.4);opacity:0;transition:.25s;z-index:15;pointer-events:none;white-space:nowrap;font-family:'Bangers',cursive;letter-spacing:6px}
#msg.show{opacity:1}
#msg.gameover{color:#cc0000;animation:bpulse .5s ease-in-out infinite alternate}
@keyframes bpulse{0%{color:#880000;transform:translate(-50%,-50%) scale(0.93)}100%{color:#ff0000;transform:translate(-50%,-50%) scale(1.08)}}
#levelup{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);font-size:38px;color:#FFD700;opacity:0;transition:.3s;z-index:15;pointer-events:none;font-family:'Bangers',cursive;letter-spacing:4px}
#levelup.show{opacity:1}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;max-height:92vh;overflow-y:auto;background:linear-gradient(160deg,rgba(5,2,18,0.99),rgba(12,3,35,0.99));color:#fff;padding:24px 20px;border-radius:26px;z-index:20;border:2px solid rgba(140,80,255,0.5);box-shadow:0 0 80px rgba(80,20,180,0.6),0 0 200px rgba(40,0,120,0.3);text-align:center}
#panel.hidden{display:none!important}
#panel h2{font-size:28px;margin-bottom:4px;color:#FFD700;font-family:'Bangers',cursive;letter-spacing:3px;text-shadow:0 0 20px #FFD700}
#panel p{font-size:11px;color:#c9aaee;margin-bottom:8px;line-height:1.5}
.btn{width:100%;padding:12px;border:none;border-radius:14px;font-size:15px;background:linear-gradient(135deg,#16a34a,#15803d);cursor:pointer;color:#fff;margin-top:6px;font-family:'Bangers',cursive;letter-spacing:2px;transition:transform .1s,box-shadow .1s}
.btn:active{opacity:0.8;transform:scale(0.97)}
.btn-red{background:linear-gradient(135deg,#8b0000,#cc0000)}
#lvlbar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:5;width:240px;pointer-events:none}
.bar-bg{background:rgba(0,0,0,0.6);border-radius:20px;height:10px;border:1px solid rgba(180,100,255,0.3);overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#9333ea,#f59e0b,#FFD700);border-radius:20px;transition:width .4s;box-shadow:0 0 8px rgba(168,85,247,0.6)}
.bar-lbl{text-align:center;font-size:9px;color:#a78bca;margin-top:2px}
#actionBtns{position:fixed;left:10px;bottom:90px;z-index:8;display:none;flex-direction:column;gap:8px;align-items:center}
.action-btn{width:60px;height:60px;border-radius:50%;border:3px solid;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:12px;line-height:1.1;text-align:center;color:#fff}
#joyBase{position:fixed;left:14px;bottom:78px;width:136px;height:136px;border-radius:50%;background:rgba(168,85,247,0.1);border:2.5px solid rgba(168,85,247,0.45);display:none;touch-action:none;z-index:8}
#joyStick{position:fixed;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(220,170,255,0.95),rgba(140,60,220,0.85));border:2.5px solid rgba(240,200,255,0.9);display:none;transform:translate(-50%,-50%);pointer-events:none;z-index:9}
#modeToggle{position:fixed;bottom:12px;left:10px;z-index:8;display:none;background:rgba(28,8,62,0.88);border:1.5px solid rgba(168,85,247,0.5);border-radius:16px;padding:5px 10px;color:#c084fc;font-size:10px;font-family:'Fredoka One',cursive;cursor:pointer;touch-action:manipulation}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div class="ui-left">
    <div class="ui-label" id="lblScore">SCORE</div>
    <div class="ui-score" id="scoreEl">0</div>
    <div class="ui-label" id="lblLevel" style="margin-top:4px">LEVEL</div>
    <div class="ui-level" id="levelEl">1</div>
  </div>
  <div class="ui-right">
    <div id="livesEl" class="ui-lives"></div>

  </div>
</div>
<div id="msg"></div>
<div id="levelup"></div>
<div id="lvlbar">
  <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <div class="bar-lbl" id="barLbl">0 / 30 pts &rarr; Niv 2</div>
</div>
<div id="actionBtns"></div>
<button id="pauseBtn" onclick="togglePause()" style="position:fixed;top:8px;left:50%;transform:translateX(-50%) translateX(-40px);z-index:8;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:16px;padding:4px 12px;cursor:pointer;touch-action:manipulation">⏸</button>
<button id="soundBtn" onclick="toggleSound()" style="position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:8;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:16px;padding:4px 12px;cursor:pointer;touch-action:manipulation">🔊</button>
<div id="joyBase"></div>
<div id="joyStick"></div>
<button id="modeToggle" onclick="toggleInputMode()">Joystick</button>
<div id="panel">
  <div style="font-size:42px;margin-bottom:2px;text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,165,0,0.4);font-family:'Bangers',cursive;letter-spacing:5px;color:#FFD700">&#x2693; HORMUZ</div>
  <p id="subtitle" style="font-size:12px;color:#88aacc;margin-bottom:4px;letter-spacing:1px">SAVE DROWNING CHICKS &amp; SURVIVE THE RIVER</p>
  <div style="width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.6),transparent);margin:8px auto 14px"></div>

  <button class="btn" id="btnPlay" onclick="startGame()" disabled style="opacity:0.5;font-size:20px;padding:18px;letter-spacing:3px;border-radius:16px;box-shadow:0 0 30px rgba(22,163,74,0.5)">&#x23F3; Loading...</button>

  <button class="btn" id="btnScores" onclick="toggleScores()" style="margin-top:10px;background:linear-gradient(135deg,#7c3aed,#5b21b6);font-size:16px;padding:12px;letter-spacing:2px;border-radius:14px">&#x1F3C6; <span id="lblScores">HIGH SCORES</span></button>

  <div id="scoresBox" style="display:none;margin-top:10px;padding:14px;background:linear-gradient(135deg,rgba(124,58,237,0.18),rgba(91,33,182,0.1));border:1.5px solid rgba(168,85,247,0.5);border-radius:14px"></div>

  <div id="francStatus" onclick="openWallet()" style="margin:10px 0 4px;cursor:pointer;border-radius:14px;overflow:hidden;font-weight:bold;display:none"></div>

  <div style="display:flex;justify-content:center;gap:14px;margin:10px 0 4px">
    <button onclick="setLang('fr')" id="flagFr" style="font-size:30px;background:none;border:2px solid transparent;border-radius:10px;padding:4px 8px;cursor:pointer;transition:all 0.2s">&#x1F1EB;&#x1F1F7;</button>
    <button onclick="setLang('en')" id="flagEn" style="font-size:30px;background:none;border:2px solid transparent;border-radius:10px;padding:4px 8px;cursor:pointer;transition:all 0.2s">&#x1F1EC;&#x1F1E7;</button>
  </div>

  <div style="margin-top:12px;padding:12px 14px;background:linear-gradient(135deg,rgba(100,40,200,0.12),rgba(168,85,247,0.06));border:1px solid rgba(168,85,247,0.3);border-radius:14px;font-size:11px;text-align:left">
    <div id="rulesTitle" style="color:#c084fc;font-family:'Bangers',cursive;letter-spacing:2px;font-size:13px;margin-bottom:8px">&#x1F48E; $FRANC RULES</div>
    <div style="display:flex;align-items:center;gap:6px;color:#ff8888;margin-bottom:4px">
      <span style="font-size:16px">&#x1F90D;</span>
      <span id="ruleNoFranc">Without $FRANC: <b style="color:#fff">1 life only</b></span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;color:#a3e635">
      <span style="font-size:16px">&#x1F49A;</span>
      <span id="ruleFranc">Holding $FRANC: <b style="color:#FFD700">10 lives</b> + bonuses</span>
    </div>
  </div>
</div>
<script>
const C=document.getElementById('gc'),ctx=C.getContext('2d');
function resize(){C.width=innerWidth;C.height=innerHeight;}
addEventListener('resize',resize);resize();
const W=()=>C.width,H=()=>C.height;
const RL=()=>Math.floor(W()*0.17),RR=()=>Math.floor(W()*0.83),RW=()=>RR()-RL();
const PTS_LVL=30,MAX_LVL=11,INV=300;
let MAX_LIVES=1;
const MORT_SUBITE=11;
const isMob=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||W()<700;
let hasFranc=false;
let francBalance=0;
let walletLinked=false;
let unlockReason=localStorage.getItem('flc_reason')||null;  // "solana" | "ton" | "stars" | null
let comboCount=0,comboMult=1,comboTimer=0;
let submarines=[];  // ally submarines
let weather={type:'clear',timer:0,intensity:0,nextIn:600+Math.floor(Math.random()*200),rainCount:0,fogCount:0};
const WEATHER_RAMP_IN=10;   // 10s fade in
const WEATHER_HOLD=30;      // 30s full intensity
const WEATHER_RAMP_OUT=10;  // 10s fade out
const WEATHER_TOTAL=WEATHER_RAMP_IN+WEATHER_HOLD+WEATHER_RAMP_OUT; // 50s
const WEATHER_MAX=4;

function gameHour(){
  // 1 min real = 1 hour game. Start at noon = 720 game-minutes = 720 real seconds
  if(!S)return 12;
  return ((S.gameSeconds*3 + 720) % 1440) / 60;  // 0-24, x3 speed
}
function gameTimeStr(){
  const h=gameHour();
  let hh=Math.floor(h)%24;
  const mm=Math.floor((h%1)*60);
  const ampm=hh>=12?'PM':'AM';
  if(hh===0)hh=12;
  else if(hh>12)hh-=12;
  return hh+':'+(mm<10?'0':'')+mm+' '+ampm;
}
function isDaylight(){
  const h=gameHour()%24;
  return h>=6&&h<20;
}
function skyColor(){
  // Returns sky overlay color based on hour
  const h=gameHour()%24;
  if(h>=6&&h<8)return {r:255,g:180,b:100,a:0.15*(h-6)/2};   // dawn
  if(h>=8&&h<18){
    // Day — grand soleil : halo doré chaud le plus fort à midi (h=13)
    const noonDist=Math.abs(h-13)/5; // 0 à midi, 1 aux extrêmes (8h et 18h)
    const intensity=1-noonDist; // luminosité max à midi
    return {r:255,g:230,b:140,a:0.10+0.08*intensity};
  }
  if(h>=18&&h<20)return {r:200,g:100,b:30,a:0.18*(h-18)/2};  // dusk
  if(h>=20&&h<22)return {r:20,g:10,b:60,a:0.25*(h-20)/2};    // evening
  if(h>=22||h<4)return {r:5,g:0,b:30,a:0.45};                // night
  if(h>=4&&h<6)return {r:20,g:10,b:60,a:0.25*(1-(h-4)/2)};  // pre-dawn
  return {r:0,g:0,b:0,a:0};
}
const SUPABASE_URL='https://mubqtnqulpyehkgubhnh.supabase.co/functions/v1';

// ─── SYSTÈME DE LANGUE FR/EN ───
let LANG=localStorage.getItem('hormuz_lang')||'fr';
const I18N={
  fr:{
    subtitle:"SAUVE LES POUSSINS &amp; SURVIS À LA RIVIÈRE",
    play:"&#x25B6; JOUER",
    loading:"&#x23F3; Chargement...",
    scores:"MEILLEURS SCORES",
    rulesTitle:"&#x1F48E; RÈGLES $FRANC",
    ruleNoFranc:"Sans $FRANC : <b style='color:#fff'>1 seule vie</b>",
    ruleFranc:"Avec $FRANC : <b style='color:#FFD700'>10 vies</b> + bonus",
    walletConnected:"WALLET CONNECTÉ ✅",
    walletConnectedSub:"Connecté",
    walletLocked:"TAPE POUR DÉBLOQUER 10 VIES",
    walletLockedSub:"Wallet non connecté",
    gameOver:"PERDU !",
    score:"Score",
    level:"Niveau",
    best:"Meilleur",
    retry:"&#x21BB; REJOUER",
    menu:"MENU",
    noScores:"Aucun score pour le moment",
    yourTop:"Ton Top 3"
  },
  en:{
    subtitle:"SAVE DROWNING CHICKS &amp; SURVIVE THE RIVER",
    play:"&#x25B6; PLAY",
    loading:"&#x23F3; Loading...",
    scores:"HIGH SCORES",
    rulesTitle:"&#x1F48E; $FRANC RULES",
    ruleNoFranc:"Without $FRANC: <b style='color:#fff'>1 life only</b>",
    ruleFranc:"Holding $FRANC: <b style='color:#FFD700'>10 lives</b> + bonuses",
    walletConnected:"WALLET CONNECTED ✅",
    walletConnectedSub:"Connected",
    walletLocked:"TAP TO UNLOCK 10 LIVES",
    walletLockedSub:"Wallet not connected",
    gameOver:"GAME OVER!",
    score:"Score",
    level:"Level",
    best:"Best",
    retry:"&#x21BB; RETRY",
    menu:"MENU",
    noScores:"No scores yet",
    yourTop:"Your Top 3"
  }
};
function T(key){return (I18N[LANG]&&I18N[LANG][key])||I18N.en[key]||key;}
function setLang(lang){
  LANG=lang;
  try{localStorage.setItem('hormuz_lang',lang);}catch(e){}
  applyLang();
}
function applyLang(){
  const set=(id,html)=>{const el=document.getElementById(id);if(el)el.innerHTML=html;};
  set('subtitle',T('subtitle'));
  set('lblScores',T('scores'));
  set('rulesTitle',T('rulesTitle'));
  set('ruleNoFranc',T('ruleNoFranc'));
  set('ruleFranc',T('ruleFranc'));
  set('lblScore',LANG==='fr'?'SCORE':'SCORE');
  set('lblLevel',LANG==='fr'?'NIVEAU':'LEVEL');
  set('lblTime',LANG==='fr'?'HEURE':'TIME');
  // Bouton play selon état de chargement
  const playBtn=document.getElementById('btnPlay');
  if(playBtn&&!playBtn.disabled)playBtn.innerHTML=T('play');
  // Drapeau actif : surligné
  const ff=document.getElementById('flagFr'),fe=document.getElementById('flagEn');
  if(ff)ff.style.borderColor=LANG==='fr'?'#FFD700':'transparent';
  if(fe)fe.style.borderColor=LANG==='en'?'#FFD700':'transparent';
  // Mettre à jour le wallet status et les scores si affichés
  if(typeof updateFrancUI==='function')updateFrancUI();
  const sb=document.getElementById('scoresBox');
  if(sb&&sb.style.display!=='none')renderScores();
}
function renderScores(){
  const sb=document.getElementById('scoresBox');if(!sb)return;
  const top=getTop3();
  if(top.length===0){
    sb.innerHTML='<div style="color:#c084fc;font-size:13px">'+T('noScores')+'</div>';
    return;
  }
  const medals=['&#x1F947;','&#x1F948;','&#x1F949;'];
  let html='<div style="color:#FFD700;font-family:Bangers,cursive;letter-spacing:2px;font-size:15px;margin-bottom:8px">'+T('yourTop')+'</div>';
  top.forEach((s,i)=>{
    html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:15px"><span>'+medals[i]+'</span><span style="color:#FFD700;font-weight:bold;font-family:monospace">'+s+'</span></div>';
  });
  sb.innerHTML=html;
}
function toggleScores(){
  const sb=document.getElementById('scoresBox');if(!sb)return;
  if(sb.style.display==='none'){sb.style.display='block';renderScores();}
  else{sb.style.display='none';}
}
const WALLET_URL='https://t.me/FrancisLeCoqBot/wallet';
let inputMode=localStorage.getItem('rm')||'drag';
let joyAct=false,joyDX=0,joyDY=0,dragAct=false,dragX=0,dragY=0;
const JR=64,JSP=4.2,DL=0.2,FO=88;
let S,boat,objs,bulls,pBulls,exps,parts,savFX,keys,scY,af,tInt,sInt;
let shk=0,shkD=0,frN=0,mTout,lTout;
let spinA=0,spinSp=0,spinT=0,spinOn=false;
let fireOn=false,fireCD=0;
const FIRE_RATE=32; // remplacé par getFireCooldown()
let colLock=false,narrowPassages=[];
let paused=false;
let nextFrancBonus=100;

// ── PRELOAD IMAGES ──
let boatLoaded=false,crocoLoaded=false,sharkLoaded=false,islandLoaded=false,
    subLoaded=false,trunkLoaded=false,turtleLoaded=false,hippoLoaded=false,eagleLoaded=false;
const BASE_IMG='https://raw.githubusercontent.com/FrancLeCoq/Hormuz/main/';
function mkImg(file,onload){const i=new Image();i.crossOrigin='anonymous';i.onload=onload;i.src=BASE_IMG+file;return i;}
const imgBoat  =mkImg('Bateau.png',      ()=>boatLoaded=true);
const imgCroco =mkImg('Crocodile.png',   ()=>crocoLoaded=true);
const imgShark =mkImg('Requin.png',      ()=>sharkLoaded=true);
const imgIsland=mkImg('Ile.png',         ()=>islandLoaded=true);
const imgSub   =mkImg('Sousmarin.png',   ()=>subLoaded=true);
const imgTrunk =mkImg('Tronc.png',       ()=>trunkLoaded=true);
const imgTurtle=mkImg('Tortue.png',      ()=>turtleLoaded=true);
const imgHippo =mkImg('Hippopotame.png', ()=>hippoLoaded=true);
const imgEagle =mkImg('Aigle.png',       ()=>eagleLoaded=true);

function getLv(){return S?Math.min(MAX_LVL,Math.floor(S.score/PTS_LVL)+1):1;}
function isMS(lv){return (lv||getLv())>=MORT_SUBITE;}

function updateUI(){
  if(!S)return;
  const livesEl=document.getElementById('livesEl');
  if(livesEl)livesEl.innerHTML='<span class="ui-heart">&#x2665;</span><span class="ui-lives-count">'+Math.max(0,S.lives)+'</span>';
  document.getElementById('scoreEl').textContent=S.score;
  const lvlEl=document.getElementById('levelEl');
  if(lvlEl)lvlEl.textContent=getLv();
  const clkEl=document.getElementById('clockEl');
  if(clkEl)clkEl.textContent=gameTimeStr();
  const lv=getLv();
  if(isMS()){
    document.getElementById('barFill').style.width='100%';
    document.getElementById('barFill').style.background='linear-gradient(90deg,#ff2222,#ff8800)';
    document.getElementById('barLbl').textContent=(LANG==='fr'?'MORT SUBITE — Score: ':'SUDDEN DEATH — Score: ')+S.score;
  } else {
    const prog=(S.score%PTS_LVL)/PTS_LVL*100;
    document.getElementById('barFill').style.width=prog+'%';
    document.getElementById('barFill').style.background='linear-gradient(90deg,#a855f7,#FFD700)';
    document.getElementById('barLbl').textContent=(S.score%PTS_LVL)+' / '+PTS_LVL+(LANG==='fr'?' pts → Niv ':' pts → Lvl ')+(lv<MAX_LVL?lv+1:'MAX');
  }
  const ab=document.getElementById('actionBtns');
  ab.style.display='none'; // auto-fire, no button needed

}
function iB(){return{x:W()/2-30,y:H()-180,w:60,h:79,inv:0,sink:0};}

function startGame(){
  initAudio();
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  // Restaurer le volume si on a coupé le son lors d'un game over précédent
  try{
    if(window._masterGain&&audioCtx){window._masterGain.gain.cancelScheduledValues(audioCtx.currentTime);window._masterGain.gain.setTargetAtTime(soundEnabled?0.55:0,audioCtx.currentTime,0.1);}
    if(ambientGain&&audioCtx){ambientGain.gain.cancelScheduledValues(audioCtx.currentTime);ambientGain.gain.setTargetAtTime(soundEnabled?0.08:0,audioCtx.currentTime,0.3);}
  }catch(e){}
  nextFrancBonus=100;
  paused=false;
  MAX_LIVES=hasFranc?10:1;
  comboCount=0;comboMult=1;comboTimer=0;
  submarines=[];
  weather={type:'clear',timer:0,nextIn:600+Math.floor(Math.random()*400)};
  comboCount=0;comboMult=1;comboTimer=0;
  document.getElementById('panel').classList.add('hidden');
  document.getElementById('panel').style.borderColor='';document.getElementById('panel').style.boxShadow='';
  document.getElementById('msg').className='';
  S={running:true,lives:MAX_LIVES,score:0,gameSeconds:0,level:1};

function getFireCooldown(lv){
  if(lv>=11)return 24;
  if(lv>=10)return 32;
  if(lv>=9)return 40;
  if(lv>=8)return 50;
  if(lv>=7)return 64;
  if(lv>=6)return 80;
  if(lv>=5)return 100;
  return 120; // lv 4
}
function doFire(){
  if(!S||!S.running||fireCD>0||getLv()<4)return;
  const lv=getLv();
  const cooldown=getFireCooldown(lv);
  const bx=boat.x+boat.w/2,by=boat.y;
  const PRIORITY=['homing_enemy','enemy','shark','eagle','croco','snake','mine','barrel','turtle'];
  // Tir vers le haut : cible la plus proche devant
  let tgt=null,bestScore=-1;
  for(const o of objs){
    const pi=PRIORITY.indexOf(o.type);
    if(pi<0)continue;
    const d=Math.hypot(o.x+o.w/2-bx,o.y+o.h/2-by);
    const score=(PRIORITY.length-pi)*1000+Math.max(0,1000-d);
    if(score>bestScore){bestScore=score;tgt=o;}
  }
  if(tgt){
    const ang=Math.atan2(tgt.y+tgt.h/2-by,tgt.x+tgt.w/2-bx);
    pBulls.push({x:bx,y:by,vx:Math.cos(ang)*11,vy:Math.sin(ang)*11,life:90,r:4,color:'#00eeff',glow:'#00ffff'});
  }
  // Tir bidirectionnel vers le bas à partir du niveau 9
  if(lv>=9){
    let tgtB=null,bestB=-1;
    for(const o of objs){
      const pi=PRIORITY.indexOf(o.type);
      if(pi<0)continue;
      if((o.speed||0)>=0)continue; // cible uniquement les ennemis qui remontent (speed négatif)
      const d=Math.hypot(o.x+o.w/2-bx,(o.y+o.h/2)-(by+boat.h));
      const score=(PRIORITY.length-pi)*1000+Math.max(0,1000-d);
      if(score>bestB){bestB=score;tgtB=o;}
    }
    // Si aucun ennemi qui remonte, tirer quand même vers le bas sur n'importe quelle cible proche
    if(!tgtB){
      for(const o of objs){
        if(!PRIORITY.includes(o.type))continue;
        if(o.y+o.h/2<by+boat.h)continue; // doit être en dessous du bateau
        const d=Math.hypot(o.x+o.w/2-bx,o.y+o.h/2-(by+boat.h));
        if(d<bestB||bestB<0){bestB=d;tgtB=o;}
      }
    }
    if(tgtB){
      const angB=Math.atan2(tgtB.y+tgtB.h/2-(by+boat.h),tgtB.x+tgtB.w/2-bx);
      pBulls.push({x:bx,y:by+boat.h,vx:Math.cos(angB)*11,vy:Math.sin(angB)*11,life:90,r:4,color:'#ff6622',glow:'#ff4400'});
    } else {
      // Tirer vers le bas même sans cible
      pBulls.push({x:bx,y:by+boat.h,vx:0,vy:11,life:90,r:4,color:'#ff6622',glow:'#ff4400'});
    }
  }
  if(tgt||lv>=9){fireCD=cooldown;playSound('shoot');}
}

function handleInput(){
  if(!S||!S.running||boat.sink>0||spinOn)return;
  if(mX!==null){
    // Souris PC : priorité absolue, fonctionne même si isMob (Telegram Web fenêtre étroite)
    boat.x+=(mX-boat.w/2-boat.x)*.18;
    boat.y+=(mY-boat.h/2-boat.y)*.18;
  } else if(isMob){
    if(inputMode==='joystick'&&joyAct){const n=Math.hypot(joyDX,joyDY);if(n>0.06){const curve=n*n*.4+n*.6,a=Math.atan2(joyDY,joyDX),sp=curve*JSP;boat.x+=Math.cos(a)*sp;boat.y+=Math.sin(a)*sp;}}
    else if(inputMode==='drag'&&dragAct){boat.x+=(dragX-boat.w/2-boat.x)*DL;boat.y+=((dragY-FO)-boat.y)*DL;}
  } else {
    // Clavier PC sans souris
    if(keys['ArrowLeft']||keys['a'])boat.x-=KSP;
    if(keys['ArrowRight']||keys['d'])boat.x+=KSP;
    if(keys['ArrowUp']||keys['w'])boat.y-=KSP;
    if(keys['ArrowDown']||keys['s'])boat.y+=KSP;
  }
  if(S&&S.slowTimer>0)S.slowTimer--;
  const slowMult=S&&S.slowTimer>0?0.45:1.0;
  const sp=3.5*slowMult;
  if(keys['ArrowLeft']||keys['a']||keys['A'])boat.x-=sp;
  if(keys['ArrowRight']||keys['d']||keys['D'])boat.x+=sp;
  if(keys['ArrowUp']||keys['w']||keys['W'])boat.y-=sp;
  if(keys['ArrowDown']||keys['s']||keys['S'])boat.y+=sp;
  boat.x=Math.max(RL()+4,Math.min(RR()-boat.w-4,boat.x));
  boat.y=Math.max(30,Math.min(H()-24,boat.y));
}

// HP progressifs par niveau
function getHP(type,lv){
  const t={
    rock:     [3,3,3,4,4,7,9],
    trunk:    [3,3,3,4,4,7,9],
    mine:     [3,3,4,4,5,9,11],
    turtle:   [3,3,4,4,5,9,11],
    barrel:   [3,3,4,4,5,9,11],
    snake:    [4,4,4,5,6,11,15],
    croco:    [4,4,4,5,7,13,17],
    enemy:    [4,4,4,5,6,11,15],
    homing_enemy:[4,4,4,5,6,12,16],
    eagle:    [3,3,3,4,5,9,11],
    shark:    [6,6,6,6,6,11,15],
    hippo:    [9,9,9,11,13,23,29],
  };
  // Index : lv1-2=0, lv3-4=1, lv5=2, lv6=3, lv7-8=4, lv9-10=5, lv11=6
  const idx=lv>=11?6:lv>=9?5:lv>=7?4:lv>=6?3:lv>=5?2:lv>=3?1:0;
  return (t[type]&&t[type][idx])||3;
}
function spawnO(){
  if(!S||!S.running)return;
  const now=Date.now();
  if(now-_lastSpawnTs<500)return; // 0.5s minimum entre chaque spawn pour laisser respirer
  _lastSpawnTs=now;
  const lv=getLv(),ri=RL(),rw=RW();

  }

// ── TORTUES MARCHEUSES sur la pelouse → saut → eau ──
// Spawn rare, indépendant du système d'obstacles principal
function spawnWalkingTurtle(){
  if(!S||!S.running)return;
  const lv=getLv();
  if(lv<4)return; // disponibles à partir du même palier que les tortues normales
  const side=Math.random()<0.5?'left':'right';
  const tw=32,th=28;
  // Direction verticale aléatoire : descend ou monte le long de la berge
  const verticalDir=Math.random()<0.5?1:-1; // 1 = descend, -1 = monte
  // Position Y de spawn : selon direction, démarre en haut ou en bas hors écran
  const startY=verticalDir>0?(-th-10):(H()+10);
  // Position X : sur la berge, un peu plus loin du bord extérieur
  // Centrer dans la berge visible : entre le bord écran et RL/RR
  const bankW=side==='left'?RL():W()-RR();
  const margin=Math.max(2,bankW*0.1);
  const startX=side==='left'
    ? Math.max(margin, RL()-tw-margin-Math.random()*(bankW-tw-margin*2))
    : Math.min(W()-tw-margin, RR()+margin+Math.random()*(bankW-tw-margin*2));
  // Position Y où la tortue va tourner pour aller vers l'eau (point d'inflexion)
  const turnY=80+Math.random()*(H()-200);
  // Cible : juste au-delà du bord de la rivière
  const edgeX=side==='left'?(RL()+5):(RR()-tw-5);
  objs.push({
    type:'turtle_walking',
    x:startX,y:startY,w:tw,h:th,
    speed:0,
    vx:0,vy:verticalDir*0.55, // démarre en mouvement vertical
    targetEdgeX:edgeX,
    turnY, // Y où elle va tourner vers l'eau
    verticalDir,
    state:'walking_vertical', // walking_vertical → walking_horizontal → jumping → turtle
    side,
    walkPhase:Math.random()*Math.PI*2,
    jumpT:0,jumpStartX:0,jumpStartY:0,jumpEndX:0,jumpEndY:0,
    rot:0,
    hp:3,maxHp:3
  });
}

function updateWhirlpools(){
  for(const wp of objs){
    if(wp.type!=='whirlpool')continue;
    const cx=wp.x+wp.w/2,cy=wp.y+wp.h/2,r=wp.w/2+20;
    for(let i=objs.length-1;i>=0;i--){
      const o=objs[i];if(o===wp||o.type==='whirlpool'||o.type==='candy')continue;
      const dx=(o.x+o.w/2)-cx,dy=(o.y+o.h/2)-cy,d=Math.hypot(dx,dy);
      if(d<r&&d>1){
        // Mark as being sucked in
        if(!o.whirlSpin)o.whirlSpin=0;
        o.whirlSpin+=0.18; // spin angle increases
        // Scale down as it approaches
        o.whirlScale=Math.max(0.05,d/r);
        // Spiral pull: radial + tangential
        const pullForce=3.0*(1-d/r)+0.5;
        o.x-=dx/d*pullForce;o.y-=dy/d*pullForce;
        o.x+=(-dy/d)*1.4;o.y+=(dx/d)*1.4;
        if(d<16){
          // Sucked in — purple puff, no explosion
          spawnB(o.x+o.w/2,o.y+o.h/2,'#cc88ff',5);
          playSound('whirlpool');
          objs.splice(i,1);
        }
      } else {
        // Outside whirlpool — reset spin
        o.whirlSpin=undefined;o.whirlScale=undefined;
      }
    }
    if(boat.inv<=0&&boat.sink<=0){
      const bdx=(boat.x+boat.w/2)-cx,bdy=(boat.y+boat.h/2)-cy,bd=Math.hypot(bdx,bdy);
      if(bd<r+10&&bd>1){boat.x-=bdx/bd*1.5;boat.y-=bdy/bd*1.5;if(bd<22&&frN%30===0)loseL();}
    }
  }
}

function updateHomingEnemies(){
  if(!S||!S.running)return;
  for(const o of objs){
    if(o.type!=='homing_enemy')continue;
    if(o.smart){
      const dx=(boat.x+boat.w/2)-(o.x+o.w/2),dy=(boat.y+boat.h/2)-(o.y+o.h/2),dist=Math.hypot(dx,dy)||1,sp=o.speed;
      o.vx+=dx/dist*sp*.08;o.vy+=dy/dist*sp*.08;
      const cur=Math.hypot(o.vx,o.vy);if(cur>sp){o.vx=o.vx/cur*sp;o.vy=o.vy/cur*sp;}
      o.x+=o.vx;o.y+=o.vy;o.x=Math.max(RL()+4,Math.min(RR()-o.w-4,o.x));
    } else {
      o.y+=o.vy*.5;if(o.wb)o.x+=Math.sin(frN*o.wb.wf+o.wb.wp)*o.wb.wx*0.25;
    }
    // Shoot straight down — max 2 missiles, traversent tout l'écran
    o.shootTimer--;
    if(o.shootTimer<=0){
      if((o.missilesFired||0)<2){
        const sp=Math.max(0.6, Math.abs(o.speed)*1.8);
        const bx=o.x+o.w/2;
        // life = assez grande pour traverser tout l'écran (H/sp + marge)
        const missileLife=Math.ceil(H()/sp)+100;
        bulls.push({x:bx-6,y:o.y+o.h,vx:0,vy:sp,life:missileLife,r:6,color:'#ff6600'});
        bulls.push({x:bx+6,y:o.y+o.h,vx:0,vy:sp,life:missileLife,r:6,color:'#ff6600'});
        o.missilesFired=(o.missilesFired||0)+1;
        o.shootTimer=50+Math.floor(Math.random()*40);
        spawnB(bx,o.y+o.h*.9,'#ff8800',3);
      }
    }
  }
}

function updateMines(){
  if(!S||!S.running)return;
  for(let i=objs.length-1;i>=0;i--){
    if(!objs[i])continue;const o=objs[i];if(o.type!=='mine'||o.dead)continue;
    if(o.regularOsc){
      // Oscillation régulière sinusoïdale (niv 1-5)
      o.oscPhase=(o.oscPhase||0)+0.04;
      o.vx=Math.sin(o.oscPhase)*1.2;
    } else {
      o.zig++;if(o.zig>=o.zigP){o.vx=(Math.random()-.5)*3;o.zigP=30+Math.random()*70;o.zig=0;}
    }
    o.x+=o.vx;
    const ri=RL(),rr2=RR();
    if(o.x<=ri+2){o.x=ri+2;if(Math.random()<.5)o.vx=Math.abs(o.vx);else{if(!o.dead){o.dead=true;trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);}}continue;}
    if(o.x+o.w>=rr2-2){o.x=rr2-o.w-2;if(Math.random()<.5)o.vx=-Math.abs(o.vx);else{if(!o.dead){o.dead=true;trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);}}continue;}
    if(!objs[i])continue;
    for(let j=objs.length-1;j>=0;j--){
      if(j===i||!objs[i]||!objs[j])continue;
      const a=objs[i],b=objs[j];if(b.type==='mine'||b.type==='chick'||b.type==='candy')continue;
      if(rO(a.x+3,a.y+3,a.w-6,a.h-6,b.x,b.y,b.w,b.h)){
        if(!a.dead){a.dead=true;trigEx(a.x+a.w/2,a.y+a.h/2);spawnB(b.x+b.w/2,b.y+b.h/2,'#ff8800',10);
          const ia=objs.indexOf(a),ib=objs.indexOf(b);if(ib>-1)objs.splice(ib,1);const ia2=objs.indexOf(a);if(ia2>-1)objs.splice(ia2,1);}
        break;
      }
    }
  }
}

// ── KEY FIX: CHICK pickup works even during immunity (inv>0) ──
// During inv/candy immunity: can collect chicks, candy; cannot be damaged
function checkCols(){
  if(colLock||!S||!S.running)return;
  if(boat.sink>0)return; // still sinking — no collisions at all
  colLock=true;
  try{
    const hb=14,bx=boat.x+hb,by=boat.y+hb,bw=boat.w-hb*2,bh=boat.h-hb*2;
    for(let i=objs.length-1;i>=0;i--){
      if(!objs[i])continue;const o=objs[i];
      if(!rO(bx,by,bw,bh,o.x,o.y,o.w,o.h))continue;
      if(o.type==='chick'){
        objs.splice(i,1);
        comboCount++;comboTimer=300; // 5s window
        if(comboCount>=3&&comboMult===1){comboMult=2;spawnMsg('x2 COMBO!',1800);}
        const pts=o.pts*comboMult;
        S.score+=pts;
        window._lastChickPts=pts;playSound('chick');
        savFX.push({x:o.x,y:o.y-10,life:40,pts:pts,combo:comboMult>1});spawnB(o.x+o.w/2,o.y+o.h/2,comboMult>1?'#FFD700':'#ffdd00',pts*3+5);
        if(hasFranc&&S.score>=nextFrancBonus){nextFrancBonus+=100;if(S.lives<MAX_LIVES){S.lives++;spawnB(boat.x+boat.w/2,boat.y,'#ff4444',12);}}
        updateUI();continue;
      }
      if(o.type==='golden_chick'){
        playSound('golden_chick');objs.splice(i,1);S.score+=10;S.lives=Math.min(MAX_LIVES,S.lives+1);
        savFX.push({x:o.x,y:o.y-10,life:60,pts:10,golden:true});spawnB(o.x+o.w/2,o.y+o.h/2,'#FFD700',20);
        updateUI();continue;
      }
      if(o.type==='mosquito'){
        // Touch mosquito = slow boat for 3s
        objs.splice(i,1);S.slowTimer=(S.slowTimer||0)+180;spawnB(o.x+o.w/2,o.y+o.h/2,'#88cc44',10);continue;
      }
      if(o.type==='candy'){
        // Collectible même en immunité, mais ne recharge pas au-delà de INV/2
        objs.splice(i,1);if(boat.inv<INV/2)boat.inv=Math.min(INV/2,boat.inv+INV/2);spawnB(o.x+o.w/2,o.y+o.h/2,'#ff88cc',14);continue;
      }
      // All other collisions: only happen when NOT invincible
      if(boat.inv>0)continue;
      if(o.type==='mine'){if(!o.dead){o.dead=true;playSound('mine');trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);colLock=false;loseL();return;}}
      else if(o.type==='hippo'){
        // L'hippo ne peut tuer que quand il est visible (en train d'émerger ou en surface)
        const emerge=o.phase==='surface'||o.phase==='emerging';
        if(emerge){colLock=false;loseL();return;}
      }
      else if(['island','rock','trunk','croco','shark','enemy','homing_enemy','snake','eagle','barrel','turtle'].includes(o.type)){colLock=false;loseL();return;}
    }
    // Enemy bullets — only when not invincible
    if(boat.inv<=0){
      for(let i=bulls.length-1;i>=0;i--){
        if(!bulls[i])continue;const b=bulls[i];
        if(rO(bx,by,bw,bh,b.x-6,b.y-6,12,12)){
          bulls.splice(i,1);spawnB(b.x,b.y,'#ff6600',8);
          colLock=false;loseL();return;
        }
      }
    }
    // Chick hit by various obstacles — different death types
    const EATERS=['croco','shark','snake','hippo','eagle','mosquito'];
    const EXPLODERS=['mine','barrel'];
    const WHIRLERS=['whirlpool'];
    const KILLERS=['rock','trunk','island','enemy','homing_enemy'];
    for(let ci=objs.length-1;ci>=0;ci--){
      if(!objs[ci]||objs[ci].type!=='chick')continue;
      const chick=objs[ci];
      let chickKilled=false;
      for(let pi=objs.length-1;pi>=0;pi--){
        if(!objs[pi]||pi===ci)continue;
        const pred=objs[pi];
        if(!rO(chick.x,chick.y,chick.w,chick.h,pred.x,pred.y,pred.w,pred.h))continue;
        const cx=chick.x+chick.w/2,cy=chick.y+chick.h/2;
        if(EATERS.includes(pred.type)){
          // Eaten by animal
          savFX.push({x:cx,y:cy-8,life:55,maxLife:55,text:'Yum! 😋',color:'#ff8800',size:26});
          spawnBlood(cx,cy);playSound('eaten');
        } else if(EXPLODERS.includes(pred.type)){
          // Hit by mine/barrel — small explosion
          exps.push({x:cx,y:cy,r:2,maxR:22,life:16,maxLife:16});
          if(parts.length<280)for(let p=0;p<5;p++){const a=Math.random()*Math.PI*2;parts.push({x:cx,y:cy,vx:Math.cos(a)*2,vy:Math.sin(a)*2,life:14,maxLife:14,color:'#ff6600',r:2,type:'fire'});}
          savFX.push({x:cx,y:cy-10,life:30,maxLife:30,text:'💥',color:'#ff6600',size:22});
          playSound('hit');
        } else if(WHIRLERS.includes(pred.type)){
          // Sucked into whirlpool — add spin properties to chick
          chick.whirlSpin=0;chick.whirlScale=1;
          chick.whirlTarget={cx:pred.x+pred.w/2,cy:pred.y+pred.h/2};
          // Don't kill yet — let whirlpool update handle it
          continue;
        } else if(KILLERS.includes(pred.type)){
          // Hit by hard obstacle — blood drop
          savFX.push({x:cx,y:cy-8,life:40,maxLife:40,text:'🩸',color:'#cc0000',size:20});
          spawnBlood(cx,cy);playSound('hit');
        } else {
          continue; // other types don't kill chicks
        }
        objs.splice(ci,1);chickKilled=true;break;
      }
      // Whirlpool spin-to-death for chick
      if(!chickKilled&&objs[ci]&&chick.whirlTarget){
        chick.whirlSpin=(chick.whirlSpin||0)+0.2;
        chick.whirlScale=Math.max(0,(chick.whirlScale||1)-0.04);
        chick.x+=(chick.whirlTarget.cx-cx)*0.08;
        chick.y+=(chick.whirlTarget.cy-(chick.y+chick.h/2))*0.08;
        if(chick.whirlScale<=0.05){
          spawnB(cx,cy,'#cc88ff',4);objs.splice(ci,1);
        }
      }
    }
    // Player bullets vs all shootable + splittable objects
    for(let i=pBulls.length-1;i>=0;i--){
      if(!pBulls[i])continue;const b=pBulls[i];let hit=false;
      for(let j=objs.length-1;j>=0;j--){
        if(!objs[j])continue;const o=objs[j];
        const shootable=['homing_enemy','enemy','croco','shark','snake','hippo','barrel','mine','turtle'];
        if(!shootable.includes(o.type))continue;
        // Serpent : collision sur chaque segment (hitbox réelle large)
        let collides=false;
        if(o.type==='snake'&&o.segs){
          const hr=(o.hitR||18)+b.r;
          for(const seg of o.segs){if(Math.hypot(b.x-seg.x,b.y-seg.y)<hr){collides=true;break;}}
        } else {
          collides=rO(b.x-b.r,b.y-b.r,b.r*2,b.r*2,o.x,o.y,o.w,o.h);
        }
        if(collides){
          spawnB(b.x,b.y,'#ffaa00',5);
          if(o.hp===undefined)o.hp=1;
          o.hp--;
          if(o.hp<=0){
            // +1 point bonus pour chaque élimination par tir
            S.score+=1;
            savFX.push({x:o.x+o.w/2,y:o.y-10,life:45,maxLife:45,text:'+1pt',color:'#00ff88',size:16});
            updateUI();
            if(o.type==='mine'){
              if(!o.dead){o.dead=true;trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(j,1);}
            } else if(o.type==='rock'||o.type==='trunk'){
              splitObject(o,j);
            } else if(o.type==='barrel'){
              // Big explosion + chain: damage nearby objects
              const bcx=o.x+o.w/2,bcy=o.y+o.h/2;
              trigEx(bcx,bcy);trigEx(bcx-20,bcy+10);trigEx(bcx+20,bcy+10);
              for(let k=objs.length-1;k>=0;k--){if(!objs[k])continue;const nb=objs[k];if(Math.hypot(nb.x+nb.w/2-bcx,nb.y+nb.h/2-bcy)<70&&nb.type!=='chick'&&nb.type!=='candy'){nb.hp=(nb.hp||1)-2;if(nb.hp<=0){if(nb.type==='rock'||nb.type==='trunk')splitObject(nb,k);else objs.splice(k,1);}}}
              objs.splice(j,1);
            } else {
              trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(j,1);
            }
          } else {
            // Hit flash
            playSound('hit');o.hitFlash=(o.hitFlash||0)+8;
          }
          hit=true;break;
        }
      }
      if(hit)pBulls.splice(i,1);
    }
  }finally{colLock=false;}
}

function update(){
  if(!S||!S.running)return;
  frN++;handleInput();
  if(frN%60===0){updateAmbientSound();}
  // Poussins : fréquence croissante par niveau
  // Niv 1-2: ~10s | Niv 3-4: ~8s | Niv 5-6: ~6s | Niv 7-8: ~5s | Niv 9-11: ~4s

  for(let i=objs.length-1;i>=0;i--){

    }
    if(o.type==='current_zone'){if(boat.sink<=0){const inZone=rO(boat.x,boat.y,boat.w,boat.h,o.x,o.y,o.w,o.h);if(inZone){boat.x+=o.dir*(o.strength*2.5);boat.x=Math.max(RL()+4,Math.min(RR()-boat.w-4,boat.x));}}}
    if(o.type==='mosquito'&&boat.inv<=0){const dx=boat.x+boat.w/2-(o.x+o.w/2),dy=boat.y+boat.h/2-(o.y+o.h/2),d=Math.hypot(dx,dy);if(d<80){o.x+=dx/d*0.8;o.y+=dy/d*0.8;}for(const s of o.swarm)s.a+=s.s;}
    if(o.type==='golden_chick'){o.life--;if(o.life<=0)objs.splice(i,1);}

  for(let i=exps.length-1;i>=0;i--){const e=exps[i];e.r+=(e.maxR-e.r)*.17;e.life--;if(e.life<=0)exps.splice(i,1);}

  savFX=savFX.filter(e=>{e.y-=.8;e.life--;return e.life>0;});
  if(shkD>0){shkD--;if(!shkD)shk=0;}

// ── WEATHER EFFECTS ──
let rainDrops=[];
function drawWeather(){
  if(!weather||weather.type==='clear'||(weather.intensity||0)<=0)return;
  const t2=Date.now();
  const alpha=Math.min(1,weather.intensity||0);
  if(alpha<=0)return;

  if(weather.type==='rain'){
    // Generate raindrops
    const count=Math.floor(20*alpha);
    for(let i=0;i<count;i++){
      rainDrops.push({
        x:RL()+Math.random()*RW(),y:-10,
        vx:-0.5+Math.random()*1,vy:8+Math.random()*6,life:1
      });
    }
    rainDrops=rainDrops.filter(d=>{
      d.x+=d.vx;d.y+=d.vy;return d.y<H()+10;
    });
    ctx.save();ctx.globalAlpha=0.55*alpha;ctx.strokeStyle='rgba(180,220,255,0.8)';ctx.lineWidth=1.2;
    for(const d of rainDrops){
      ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+d.vx*3,d.y+d.vy*3);ctx.stroke();
    }
    ctx.restore();
    // Rain ripples on river
    ctx.save();ctx.globalAlpha=0.2*alpha;
    for(let i=0;i<8;i++){
      const rx2=RL()+Math.random()*RW(),ry=Math.random()*H();
      const rr2=2+Math.random()*8;
      ctx.strokeStyle='rgba(180,220,255,0.6)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.ellipse(rx2,ry,rr2,rr2*.4,0,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
    // Darken river slightly
    ctx.fillStyle=`rgba(0,20,60,${0.18*alpha})`;ctx.fillRect(0,0,W(),H());
  }

  if(weather.type==='fog'){
    // Layered fog strips — épaisses et opaques
    ctx.save();
    const fogY=(-t2*.015%H());
    for(let layer=0;layer<6;layer++){
      const y=(fogY+layer*(H()/6))%H();
      const grd=ctx.createLinearGradient(0,y-50,0,y+90);
      grd.addColorStop(0,'rgba(220,230,240,0)');
      grd.addColorStop(0.5,`rgba(220,230,240,${0.55*alpha})`);
      grd.addColorStop(1,'rgba(220,230,240,0)');
      ctx.fillStyle=grd;ctx.fillRect(0,y-50,W(),140);
    }
    ctx.restore();
    // Voile global de visibilité réduite
    ctx.save();
    ctx.fillStyle=`rgba(210,225,240,${0.35*alpha})`;ctx.fillRect(0,0,W(),H());
    ctx.restore();
  }

  // Weather badge
  if(weather.timer>0&&weather.timer<280){
    ctx.save();ctx.globalAlpha=Math.min(1,alpha*1.5);
    ctx.font='bold 11px Bangers,cursive';ctx.textAlign='center';ctx.fillStyle='rgba(200,230,255,0.85)';
    ctx.fillText(weather.type==='rain'?'🌧 RAIN':'🌫 FOG',W()/2,H()-40);
    ctx.restore();
  }
}

// ── LAMPPOSTS along the river banks ──
function drawLampposts(){
  const h=gameHour()%24;
  const lit=h<6||h>=20; // lit at night
  const spacing=120;
  const offset=(scY*6)%spacing; // x6 vitesse décor

  for(let side=0;side<2;side++){
    const isLeft=side===0;
    const bankX=isLeft?RL():RR();
    const postX=isLeft?bankX-14:bankX+14;

    for(let y=-spacing+offset;y<H()+spacing;y+=spacing){
      const py=y;
      // Post pole
      ctx.strokeStyle=isLeft?'rgba(100,80,50,0.9)':'rgba(100,80,50,0.9)';
      ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(postX,py+40);ctx.lineTo(postX,py);ctx.stroke();
      // Arm extending toward river
      const armX=isLeft?postX+12:postX-12;
      ctx.beginPath();ctx.moveTo(postX,py);ctx.lineTo(armX,py-6);ctx.stroke();

      if(lit){
        // Glow halo
        const glowR=18+Math.sin(Date.now()*.003+y)*.5;
        const grd=ctx.createRadialGradient(armX,py-6,1,armX,py-6,glowR);
        grd.addColorStop(0,'rgba(255,240,160,0.85)');
        grd.addColorStop(0.4,'rgba(255,200,80,0.35)');
        grd.addColorStop(1,'rgba(255,180,60,0)');
        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(armX,py-6,glowR,0,Math.PI*2);ctx.fill();
        // Light bulb
        ctx.fillStyle='rgba(255,250,200,0.95)';
        ctx.beginPath();ctx.arc(armX,py-6,4,0,Math.PI*2);ctx.fill();
        // Light cone on water
        ctx.save();
        const coneX=isLeft?armX+8:armX-8;
        const conePath=new Path2D();
        conePath.moveTo(armX,py-6);
        conePath.lineTo(coneX-20,py+60);
        conePath.lineTo(coneX+20,py+60);
        conePath.closePath();
        ctx.fillStyle='rgba(255,220,100,0.06)';ctx.fill(conePath);
        ctx.restore();
      } else {
        // Unlit bulb — dark grey
        ctx.fillStyle='rgba(80,70,60,0.8)';
        ctx.beginPath();ctx.arc(armX,py-6,3,0,Math.PI*2);ctx.fill();
      }
    }
  }
}

// ── ALLY SUBMARINE — sweeps level entrance ──
function spawnSubmarine(lv){
  // Submarine starts at bottom, moves UP through the screen
  const sx=RL()+RW()/2-20; // centre of river
  submarines.push({
    x:sx, y:H()+60,           // starts below screen
    w:20, h:60,               // hitbox (halved)
    speed:-0.55,              // NEGATIVE = moves UP, slow pass
    shootTimer:30,
    missiles:[],
    done:false,
    alpha:1,                  // pleine opacité pour un vrai noir sur le dessus
    flash:0,
    immersionY:5              // moins immergé : on voit mieux le sous-marin
  });
}

function updateSubmarines(){
  if(!S||!S.running)return;
  for(let si=submarines.length-1;si>=0;si--){
    const sub=submarines[si];
    sub.y+=sub.speed; // negative = moves upward
    // Shoot missiles at ALL obstacles on screen
    sub.shootTimer--;
    if(sub.shootTimer<=0){
      const ALL_TARGETS=['homing_enemy','enemy','croco','shark','hippo','rock','trunk','mine','barrel','whirlpool','turtle'];
      const targets=objs.filter(o=>ALL_TARGETS.includes(o.type)&&o.y>-50&&o.y<H()+50);
      for(const tgt of targets){
        const dx=(tgt.x+tgt.w/2)-(sub.x+sub.w/2);
        const dy=(tgt.y+tgt.h/2)-(sub.y+sub.h/2);
        const dist=Math.hypot(dx,dy)||1;
        sub.missiles.push({
          x:sub.x+sub.w/2, y:sub.y,
          vx:dx/dist*14, vy:dy/dist*14,
          life:150, r:10
        });
      }
      sub.shootTimer=targets.length>0?50:20;
      if(targets.length>0)playSound('explosion');
    }
    // Update submarine missiles
    for(let mi=sub.missiles.length-1;mi>=0;mi--){
      const m=sub.missiles[mi];
      m.x+=m.vx;m.y+=m.vy;m.life--;
      if(m.life<=0){sub.missiles.splice(mi,1);continue;}
      let destroyed=false;
      for(let oi=objs.length-1;oi>=0;oi--){
        const o=objs[oi];if(!o)continue;
        // Serpent : vérifier chaque segment
        let hit=false;
        if(o.type==='snake'&&o.segs){
          const hr=(o.hitR||18)+m.r;
          for(const seg of o.segs){if(Math.hypot(m.x-seg.x,m.y-seg.y)<hr){hit=true;break;}}
        } else {
          hit=Math.hypot(m.x-(o.x+o.w/2),m.y-(o.y+o.h/2))<m.r+Math.max(o.w,o.h)/2;
        }
        if(hit){
          trigEx(o.x+o.w/2,o.y+o.h/2);
          objs.splice(oi,1);
          sub.missiles.splice(mi,1);
          sub.flash=12;
          destroyed=true;break;
        }
      }
    }
    // Remove submarine when it exits screen top
    if(sub.y<-200)submarines.splice(si,1);
  }
}

function drawSubmarines(){
  for(const sub of submarines){
    // Draw missiles first (behind sub)
    for(const m of sub.missiles){
      ctx.save();ctx.translate(m.x,m.y);
      const ang=Math.atan2(m.vy,m.vx);ctx.rotate(ang);
      // Large missile trail glow
      const grd=ctx.createLinearGradient(-m.r*5,0,m.r,0);
      grd.addColorStop(0,'rgba(255,80,0,0)');
      grd.addColorStop(0.5,'rgba(255,160,0,0.6)');
      grd.addColorStop(1,'rgba(255,240,60,0.95)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.ellipse(-m.r*2.5,0,m.r*3,m.r*.7,0,0,Math.PI*2);ctx.fill();
      // Missile body — sleek torpedo shape
      ctx.fillStyle='#c8c8e8';ctx.beginPath();ctx.ellipse(0,0,m.r,m.r*.4,0,0,Math.PI*2);ctx.fill();
      // Nose cone red
      ctx.fillStyle='#ff2200';ctx.beginPath();ctx.moveTo(m.r,0);ctx.lineTo(m.r*1.6,-m.r*.25);ctx.lineTo(m.r*1.6,m.r*.25);ctx.closePath();ctx.fill();
      // Engine glow
      ctx.fillStyle='rgba(255,140,0,0.8)';ctx.beginPath();ctx.arc(-m.r,0,m.r*.45,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // Draw submarine
    ctx.save();
    const scx=sub.x+sub.w/2, scy=sub.y+sub.h/2;
    ctx.translate(scx,scy);
    // Pleine opacité sauf pendant un flash (effet d'impact). Plus de transparence par défaut.
    const flashAlpha=(sub.flash>0)?(0.6+Math.sin(sub.flash*.5)*0.4):1;
    if(sub.flash>0)sub.flash--;
    ctx.globalAlpha=flashAlpha;

    // Rotate 180° so bow (character at top of PNG) points upward
    ctx.rotate(Math.PI);

    if(subLoaded&&imgSub.naturalWidth>0){
      const targetW=80, ratio=imgSub.naturalHeight/imgSub.naturalWidth;
      const dw=targetW, dh=targetW*ratio;
      // Légèrement éclairci : le corps du sub reste sombre mais la casquette rouge
      // et les cheveux jaunes du personnage ressortent bien
      ctx.filter='brightness(1.35) contrast(1.1)';
      ctx.drawImage(imgSub,-dw/2,-dh/2,dw,dh);
      ctx.filter='none';
    } else {
      ctx.fillStyle='#222244';ctx.beginPath();ctx.ellipse(0,0,12,40,0,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();

    // Water wake — drawn in world space BELOW the sub (it's moving up)
    const wakeY=sub.y+sub.h/2+10;
    const wakeX=sub.x+sub.w/2;
    ctx.save();ctx.globalAlpha=0.35;
    for(let i=0;i<4;i++){
      const wo=Math.sin(Date.now()*.005+i)*6;
      ctx.strokeStyle='rgba(180,230,255,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(wakeX-18+i*8,wakeY+i*8+wo);
      ctx.lineTo(wakeX-8+i*8,wakeY+i*8+wo+8);ctx.stroke();
    }
    ctx.restore();
  }
}

function drawScene(){
  ctx.clearRect(0,0,W(),H());
  const sky=skyColor();
  const ms=isMS();
  // Background
  if(ms){
    // Mort subite: deep red hellscape
    ctx.fillStyle='#1a0000';ctx.fillRect(0,0,W(),H());
    // Pulsing red vignette
    const rv=0.15+Math.sin(Date.now()*.003)*0.08;

function drawBank(x,w){
  const g=['#175208','#1e6a09','#145006','#226614','#0e3d05','#1a5808','#0b3204'],d=['#0a2e03','#102d04','#082403'];
  // Texture originale en mosaïque, mais le hash intègre scY pour faire défiler naturellement
  const scrolled=Math.floor(scY*6)%8;
  for(let dy=0;dy<H();dy+=4){
    for(let dx=0;dx<w;dx+=4){
      const pct=x===0?(w-dx)/w:dx/w;
      const hash=((dx*13+(dy+scrolled)*7)>>>0)%7;
      ctx.fillStyle=pct>.12?g[hash%g.length]:d[hash%d.length];
      ctx.fillRect(x+dx,dy,4,4);
    }
  }
  // River edge shadow
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(x===0?x+w-8:x,0,8,H());

  const vegSpacing=52;
  const vegOffset=(scY*6)%vegSpacing;
  for(let dy=-vegSpacing+vegOffset;dy<H()+vegSpacing;dy+=vegSpacing){
    const fx=x===0?x+w*.42:x+w*.45;
    ctx.fillStyle='#ddcc44';ctx.beginPath();ctx.arc(fx,dy,2.5,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='rgba(100,80,60,0.7)';ctx.beginPath();ctx.ellipse(fx-6,dy+38,4,3,0.3,0,Math.PI*2);ctx.fill();
  }
}

  if(boat.sink>0||spinOn){const pulse=0.5+Math.sin(Date.now()*.04)*0.35;ctx.strokeStyle='rgba(255,30,0,'+pulse+')';ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+10,boat.h/2+10,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(255,100,0,'+(pulse*0.5)+')';ctx.lineWidth=14;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+18,boat.h/2+18,0,0,Math.PI*2);ctx.stroke();}

    ctx.globalAlpha=flicker?0.22:0.9;

let audioCtx=null;
let engineNode=null,engineGain=null;
let ambientGain=null,ambientOsc=null;
let soundEnabled=true;

function initAudio(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    // Master gain
    const master=audioCtx.createGain();master.gain.value=0.55;master.connect(audioCtx.destination);
    window._masterGain=master;
    startAmbient();
  }catch(e){audioCtx=null;}
}

// engine hum removed

function startAmbient(){
  if(!audioCtx)return;
  ambientGain=audioCtx.createGain();ambientGain.gain.value=0;ambientGain.connect(window._masterGain);
  // River flow white noise
  const bufSize=audioCtx.sampleRate*2;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
  const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=400;f.Q.value=0.8;
  src.connect(f);f.connect(ambientGain);src.start();
  ambientGain.gain.setTargetAtTime(soundEnabled?0.08:0,audioCtx.currentTime,0.5);
}

function updateAmbientSound(){
  if(!audioCtx||!ambientGain)return;
  // Rain sound: add noise layer
  const isRaining=weather&&weather.type==='rain'&&(weather.intensity||0)>0;
  const targetGain=soundEnabled?(isRaining?0.22*weather.intensity+0.06:0.06):0;
  ambientGain.gain.setTargetAtTime(targetGain,audioCtx.currentTime,0.3);

}

// One-shot sounds
function playSound(type){
  if(!audioCtx||!soundEnabled)return;
  const ac=audioCtx,now=ac.currentTime;
  const mg=window._masterGain;
  try{
    if(type==='shoot'){
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='square';o.frequency.setValueAtTime(900,now);o.frequency.exponentialRampToValueAtTime(200,now+0.08);
      g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.connect(g);g.connect(mg);o.start(now);o.stop(now+0.08);
    }
    else if(type==='hit'){
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(220,now);o.frequency.exponentialRampToValueAtTime(80,now+0.12);
      g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      o.connect(g);g.connect(mg);o.start(now);o.stop(now+0.12);
    }
    else if(type==='explosion'){
      // White noise burst
      const bufSize=ac.sampleRate*0.4;const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);
      const src=ac.createBufferSource();src.buffer=buf;
      const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=800;
      const g=ac.createGain();g.gain.setValueAtTime(0.6,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.4);
      src.connect(f);f.connect(g);g.connect(mg);src.start(now);
    }
    else if(type==='chick'){
      // Petit piaillement mignon de poussin (cui-cui)
      const loudGain=ac.createGain();
      loudGain.gain.value=0.85;
      loudGain.connect(ac.destination);
      // 2 petits "cui-cui" rapides en glissando montant
      const chirps=[
        {start:0,    fStart:1800,fEnd:2600,dur:0.07},
        {start:0.10, fStart:2000,fEnd:2900,dur:0.06}
      ];
      chirps.forEach(c=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='triangle';
        o.frequency.setValueAtTime(c.fStart,now+c.start);
        o.frequency.exponentialRampToValueAtTime(c.fEnd,now+c.start+c.dur);
        g.gain.setValueAtTime(0,now+c.start);
        g.gain.linearRampToValueAtTime(0.55,now+c.start+0.005);
        g.gain.exponentialRampToValueAtTime(0.001,now+c.start+c.dur);
        o.connect(g);g.connect(loudGain);
        o.start(now+c.start);o.stop(now+c.start+c.dur+0.02);
        // Petite harmonique aiguë qui donne le côté "mignon"
        const o2=ac.createOscillator(),g2=ac.createGain();
        o2.type='sine';
        o2.frequency.setValueAtTime(c.fStart*1.5,now+c.start);
        o2.frequency.exponentialRampToValueAtTime(c.fEnd*1.5,now+c.start+c.dur);
        g2.gain.setValueAtTime(0,now+c.start);
        g2.gain.linearRampToValueAtTime(0.18,now+c.start+0.005);
        g2.gain.exponentialRampToValueAtTime(0.001,now+c.start+c.dur);
        o2.connect(g2);g2.connect(loudGain);
        o2.start(now+c.start);o2.stop(now+c.start+c.dur+0.02);
      });
    }
    else if(type==='golden_chick'){
      const freqs=[800,1000,1200,1500,1200,1000,1400];
      freqs.forEach((freq,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.value=freq;
        const t=now+i*0.05;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.02);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
        o.connect(g);g.connect(mg);o.start(t);o.stop(t+0.08);
      });
    }
    else if(type==='levelup'){
      [400,500,600,800].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.value=f;
        const t=now+i*0.12;
        g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
        o.connect(g);g.connect(mg);o.start(t);o.stop(t+0.2);
      });
    }
    else if(type==='loselife'){
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(80,now+0.5);
      g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
      o.connect(g);g.connect(mg);o.start(now);o.stop(now+0.5);
    }
    else if(type==='splash'){
      // Hippo/croc water splash
      const bufSize=ac.sampleRate*0.25;const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/bufSize*6);
      const src=ac.createBufferSource();src.buffer=buf;
      const f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=600;f.Q.value=1.5;
      const g=ac.createGain();g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
      src.connect(f);f.connect(g);g.connect(mg);src.start(now);
    }
    else if(type==='whirlpool'){
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(80,now+0.8);
      g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.8);
      o.connect(g);g.connect(mg);o.start(now);o.stop(now+0.8);
    }
    else if(type==='mine'){
      // Big boom
      const bufSize=ac.sampleRate*0.6;const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
      const d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/bufSize*4);
      const src=ac.createBufferSource();src.buffer=buf;
      const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=400;
      const g=ac.createGain();g.gain.setValueAtTime(0.8,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.6);
      src.connect(f);f.connect(g);g.connect(mg);src.start(now);
      // High crack
      const o2=ac.createOscillator(),g2=ac.createGain();
      o2.type='square';o2.frequency.setValueAtTime(1200,now);o2.frequency.exponentialRampToValueAtTime(200,now+0.1);
      g2.gain.setValueAtTime(0.3,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.1);
      o2.connect(g2);g2.connect(mg);o2.start(now);o2.stop(now+0.1);
    }
    else if(type==='eaten'){
      // Crunch/munch sound
      const o2=ac.createOscillator(),g2=ac.createGain();
      o2.type='sawtooth';o2.frequency.setValueAtTime(300,now);o2.frequency.exponentialRampToValueAtTime(80,now+0.15);
      g2.gain.setValueAtTime(0.18,now);g2.gain.exponentialRampToValueAtTime(0.001,now+0.18);
      o2.connect(g2);g2.connect(mg);o2.start(now);o2.stop(now+0.18);
      // Squeak
      const o3=ac.createOscillator(),g3=ac.createGain();
      o3.type='sine';o3.frequency.setValueAtTime(800,now);o3.frequency.exponentialRampToValueAtTime(400,now+0.08);
      g3.gain.setValueAtTime(0.1,now);g3.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o3.connect(g3);g3.connect(mg);o3.start(now);o3.stop(now+0.08);
    }
    else if(type==='candy'){
      // Magic sparkle
      [1500,1800,2000,1600].forEach((f,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='sine';o.frequency.value=f;
        const t=now+i*0.03;
        g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
        o.connect(g);g.connect(mg);o.start(t);o.stop(t+0.1);
      });
    }
  }catch(e){}
}

// ── PAUSE SYSTEM ──
function togglePause(){
  if(!S||!S.running)return;
  paused=!paused;
  const btn=document.getElementById('pauseBtn');
  if(paused){
    clearInterval(tInt);clearInterval(sInt);
    if(btn)btn.textContent='▶';
    // Suspend audio
    if(audioCtx&&audioCtx.state==='running')audioCtx.suspend();
    // Draw pause overlay
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W(),H());
    ctx.fillStyle='#FFD700';ctx.font='bold 48px Bangers,cursive';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⏸ PAUSE',W()/2,H()/2);
    ctx.font='18px Fredoka One,cursive';ctx.fillStyle='#c9aaee';
    ctx.fillText('Tap to resume',W()/2,H()/2+50);
  } else {
    tInt=setInterval(tickT,1000);
    sInt=setInterval(spawnO,875);
    if(btn)btn.textContent='⏸';
    // Resume audio
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
    loop();
  }
}

async function detectFranc(){
  const tg=window.Telegram?.WebApp;
  if(tg){tg.ready();tg.expand();}
  try{
    const res=await fetch(SUPABASE_URL+'/check-franc',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        initData:tg?.initData||'',
        game_id:'hormuz'
      })
    });
    if(res.ok){
      const d=await res.json();
      walletLinked=!!(d&&d.walletLinked);

      // Verdict de déblocage : nouveau backend → d.unlocked,
      // ancien backend → fallback hasFranc. Les deux marchent.
      hasFranc=!!(d&&(d.unlocked??(d.walletLinked&&d.hasFranc)));

      // Raison du déblocage : "solana" | "ton" | "stars" | null
      unlockReason=(d&&d.reason)||(hasFranc?'solana':null);

      // Solde réel (0 pour un déblocage via Stars)
      francBalance=hasFranc?Number(d.balance||0):0;

      localStorage.setItem('flc_holder',JSON.stringify(hasFranc));
      localStorage.setItem('flc_balance',String(francBalance));
      localStorage.setItem('flc_walletLinked',JSON.stringify(walletLinked));
      localStorage.setItem('flc_reason',unlockReason||'');
    }
  }catch(e){hasFranc=false;}
  MAX_LIVES=hasFranc?10:1;
  updateFrancUI();
  // Re-check when user returns from wallet Mini App (non-running only)
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden&&!S?.running)detectFranc();
  },{once:false});
}

// Split a rock or trunk into 2 smaller pieces — fragments cannot be re-split
function splitObject(o,idx){
  // Si c'est déjà un fragment, on le détruit simplement (pas de re-split)
  if(o.isFragment){
    spawnB(o.x+o.w/2,o.y+o.h/2,'#c8a04a',6);
    objs.splice(idx,1);
    return;
  }
  spawnB(o.x+o.w/2,o.y+o.h/2,'#c8a04a',8);
  triggerShakeSoft();
  // Remove original
  objs.splice(idx,1);
  // Create 2 halves
  const spd2=o.speed*(1.1+Math.random()*.3);
  if(o.type==='rock'){
    const hw=Math.max(8,o.w/2),hh=Math.max(8,o.h/2);
    objs.push({type:'rock',x:o.x,y:o.y,w:hw,h:hh,speed:spd2,wb:{wx:-(0.25+Math.random()*0.2),wf:0.04,wp:0},hp:1,maxHp:1,isFragment:true});
    objs.push({type:'rock',x:o.x+o.w/2,y:o.y,w:hw,h:hh,speed:spd2*(0.9+Math.random()*.2),wb:{wx:(0.25+Math.random()*0.2),wf:0.04,wp:1},hp:1,maxHp:1,isFragment:true});
  } else {
    // trunk — split horizontally/vertically
    const hlen=Math.max(10,o.vertical?o.h/2:o.w/2);
    const thick=o.vertical?o.w:o.h;
    if(o.vertical){

      objs.push({type:'trunk',x:o.x,y:o.y+hlen,w:thick,h:hlen,speed:spd2*(0.85+Math.random()*.3),ang:0,vertical:true,mossPts:[],branches:[],wb:{wx:(0.2+Math.random()*0.15),wf:0.035,wp:2},hp:1,maxHp:1,isFragment:true});
    } else {
      objs.push({type:'trunk',x:o.x,y:o.y,w:hlen,h:thick,speed:spd2,ang:o.ang||0,vertical:false,mossPts:[],branches:[],wb:{wx:-(0.2+Math.random()*0.15),wf:0.035,wp:0},hp:1,maxHp:1,isFragment:true});
      objs.push({type:'trunk',x:o.x+hlen,y:o.y,w:hlen,h:thick,speed:spd2*(0.85+Math.random()*.3),ang:o.ang||0,vertical:false,mossPts:[],branches:[],wb:{wx:(0.2+Math.random()*0.15),wf:0.035,wp:2},hp:1,maxHp:1,isFragment:true});
    }
  }
