<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Hormuz Enhanced</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize(); addEventListener("resize",resize);

const W=()=>c.width, H=()=>c.height;
const RL=()=>W()*0.2, RR=()=>W()*0.8;

let boat={x:W()/2,y:H()-120,slowTimer:0};
let objs=[];
let score=0, lives=3;

let combo=0, comboMult=1, comboTimer=0;
let weather="clear", weatherTimer=300;
let currentForce=0;
let screenShake=0;

function rand(a,b){return Math.random()*(b-a)+a}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

document.addEventListener("mousemove",e=>{
  boat.x=e.clientX;
});

function spawn(){
  let r=Math.random();
  if(r<0.2) objs.push({type:"hippo",x:rand(RL(),RR()),y:-50,timer:120,state:"idle",hp:10});
  else if(r<0.4) objs.push({type:"mosquito",x:rand(RL(),RR()),y:-50});
  else if(r<0.55) objs.push({type:"barrel",x:rand(RL(),RR()),y:-50});
  else if(r<0.7) objs.push({type:"chick",x:rand(RL(),RR()),y:-50});
  else if(r<0.85) objs.push({type:"snake",y:rand(100,H()-200),t:0});
  else objs.push({type:"eagle",x:rand(RL(),RR()),y:-50,targetX:boat.x});
}

setInterval(spawn,1000);

// ===== UPDATE =====
function update(){

  boat.x += currentForce*3;

  weatherTimer--;
  if(weatherTimer<=0){
    weather=["rain","fog","sunset"][Math.floor(Math.random()*3)];
    weatherTimer=600;
    currentForce=rand(-1,1);
    setTimeout(()=>currentForce=0,5000);
  }

  if(comboTimer>0){comboTimer--;} 
  else {combo=0;comboMult=1;}

  objs.forEach(o=>{
    if(o.type==="hippo"){
      o.timer--;
      if(o.state==="idle" && o.timer<=0){
        o.state="dive"; o.timer=60;
      }
      if(o.state==="dive" && o.timer<=0){
        o.x=rand(RL(),RR()); o.y=-50;
        o.state="idle"; o.timer=120;
      }
      o.y+=1;
    }

    if(o.type==="mosquito"){
      o.x+=(boat.x-o.x)*0.02;
      o.y+=2;
      if(dist(o.x,o.y,boat.x,boat.y)<30){
        boat.slowTimer=120;
      }
    }

    if(o.type==="barrel"){
      o.y+=3;
      if(dist(o.x,o.y,boat.x,boat.y)<30){
        explode(o.x,o.y);
      }
    }

    if(o.type==="chick"){
      o.y+=3;
      if(dist(o.x,o.y,boat.x,boat.y)<30){
        score+=1*comboMult;
        combo++;
        if(combo>=3){comboMult=2;comboTimer=300;}
        o.dead=true;
      }
    }

    if(o.type==="snake"){
      o.t+=0.1;
    }

    if(o.type==="eagle"){
      o.y+=10;
      o.x+=(o.targetX-o.x)*0.1;
      if(dist(o.x,o.y,boat.x,boat.y)<20){
        hit();
      }
    }

    if(o.y>H()+50) o.dead=true;
  });

  objs=objs.filter(o=>!o.dead);
}

function explode(x,y){
  screenShake=10;
  objs.forEach(o=>{
    if(dist(o.x,o.y,x,y)<80){
      o.dead=true;
    }
  });
}

function hit(){
  lives--;
  screenShake=15;
}

// ===== DRAW =====
function draw(){

  ctx.save();

  if(screenShake>0){
    ctx.translate(rand(-5,5),rand(-5,5));
    screenShake--;
  }

  // water
  let g=ctx.createLinearGradient(0,0,0,H());
  g.addColorStop(0,"#0ea5e9");
  g.addColorStop(1,"#020617");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W(),H());

  // river
  ctx.fillStyle="#0b3b5a";
  ctx.fillRect(RL(),0,RR()-RL(),H());

  // boat
  ctx.fillStyle="white";
  ctx.fillRect(boat.x-15,boat.y-15,30,30);

  // objects
  objs.forEach(o=>{

    if(o.type==="hippo"){
      ctx.fillStyle="#6b7280";
      ctx.beginPath();
      ctx.arc(o.x,o.y,30,0,Math.PI*2);
      ctx.fill();
    }

    if(o.type==="mosquito"){
      ctx.fillStyle="black";
      for(let i=0;i<20;i++){
        ctx.fillRect(o.x+rand(-10,10),o.y+rand(-10,10),2,2);
      }
    }

    if(o.type==="barrel"){
      ctx.fillStyle="brown";
      ctx.fillRect(o.x-10,o.y-10,20,20);
    }

    if(o.type==="chick"){
      ctx.fillStyle="yellow";
      ctx.fillRect(o.x-10,o.y-10,20,20);
    }

    if(o.type==="snake"){
      ctx.strokeStyle="lime";
      ctx.beginPath();
      for(let x=RL();x<RR();x+=10){
        let y=o.y+Math.sin(o.t+x*0.05)*20;
        ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    if(o.type==="eagle"){
      ctx.fillStyle="red";
      ctx.fillRect(o.x,o.y,10,10);
    }
  });

  // weather
  if(weather==="rain"){
    for(let i=0;i<100;i++){
      ctx.fillRect(rand(0,W()),rand(0,H()),2,10);
    }
  }

  if(weather==="fog"){
    ctx.fillStyle="rgba(255,255,255,0.1)";
    ctx.fillRect(0,0,W(),H());
  }

  if(weather==="sunset"){
    ctx.fillStyle="rgba(255,150,0,0.2)";
    ctx.fillRect(0,0,W(),H());
  }

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,20,30);
  ctx.fillText("Lives: "+lives,20,60);
  ctx.fillText("Combo x"+comboMult,20,90);

  ctx.restore();
}

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
