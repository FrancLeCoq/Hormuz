<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>⚓ HORMUZ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at 50% 0%,#0a1428 0%,#02050f 75%);overflow:hidden;width:100vw;height:100vh;font-family:'Fredoka One',cursive}
#gc{position:fixed;inset:0;z-index:1}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;z-index:5;pointer-events:none;background:linear-gradient(to bottom,rgba(5,2,20,0.92),transparent)}
.ui-left{display:flex;flex-direction:column;align-items:flex-start}
.ui-right{display:flex;flex-direction:column;align-items:flex-end}
.ui-label{font-size:9px;color:#a78bca;letter-spacing:2px;text-transform:uppercase;font-family:'Fredoka One',cursive}
.ui-val{font-size:17px;font-family:'Bangers',cursive;letter-spacing:2px;color:#FFD700}
.ui-score{font-size:28px;font-family:'Bangers',cursive;letter-spacing:3px;color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,0.5)}
.ui-level{font-size:24px;font-family:'Bangers',cursive;letter-spacing:2px;color:#cc88ff;text-shadow:0 0 10px rgba(180,80,255,0.5)}
.ui-lives{display:flex;align-items:center;gap:4px}
.ui-heart{font-size:22px;filter:drop-shadow(0 0 6px rgba(255,60,60,0.8));line-height:1}
.ui-lives-count{font-size:22px;font-family:'Bangers',cursive;color:#ff4444;letter-spacing:1px;text-shadow:0 0 8px rgba(255,60,60,0.6)}
#msg{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:62px;color:#fff;text-shadow:0 0 40px #fff,0 0 80px rgba(255,255,255,0.4);opacity:0;transition:.25s;z-index:15;pointer-events:none;white-space:nowrap;font-family:'Bangers',cursive;letter-spacing:6px}
#msg.show{opacity:1}
#msg.gameover{color:#cc0000;animation:bpulse .5s ease-in-out infinite alternate}
@keyframes bpulse{0%{color:#880000;transform:translate(-50%,-50%) scale(0.93)}100%{color:#ff0000;transform:translate(-50%,-50%) scale(1.08)}}
#levelup{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);font-size:38px;color:#FFD700;opacity:0;transition:.3s;z-index:15;pointer-events:none;font-family:'Bangers',cursive;letter-spacing:4px}
#levelup.show{opacity:1}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;max-height:92vh;overflow-y:auto;background:linear-gradient(160deg,rgba(8,2,22,0.99),rgba(20,5,50,0.99));color:#fff;padding:24px 20px;border-radius:26px;z-index:20;border:2px solid rgba(140,80,255,0.5);box-shadow:0 0 80px rgba(80,20,180,0.6),0 0 200px rgba(40,0,120,0.3);text-align:center}
#panel.hidden{display:none!important}
#panel h2{font-size:28px;margin-bottom:4px;color:#FFD700;font-family:'Bangers',cursive;letter-spacing:3px;text-shadow:0 0 20px #FFD700}
#panel p{font-size:11px;color:#c9aaee;margin-bottom:8px;line-height:1.5}
.btn{width:100%;padding:12px;border:none;border-radius:14px;font-size:15px;background:linear-gradient(135deg,#16a34a,#15803d);cursor:pointer;color:#fff;margin-top:6px;font-family:'Bangers',cursive;letter-spacing:2px;transition:transform .1s,box-shadow .1s}
.btn:active{opacity:0.8;transform:scale(0.97)}
.btn-red{background:linear-gradient(135deg,#8b0000,#cc0000)}
#lvlbar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:5;width:240px;pointer-events:none}
.bar-bg{background:rgba(0,0,0,0.6);border-radius:20px;height:10px;border:1px solid rgba(180,100,255,0.3);overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#9333ea,#f59e0b,#FFD700);border-radius:20px;transition:width .4s;box-shadow:0 0 8px rgba(168,85,247,0.6)}
.bar-lbl{text-align:center;font-size:9px;color:#a78bca;margin-top:2px}
#actionBtns{position:fixed;left:10px;bottom:90px;z-index:8;display:none;flex-direction:column;gap:8px;align-items:center}
.action-btn{width:60px;height:60px;border-radius:50%;border:3px solid;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:12px;line-height:1.1;text-align:center;color:#fff}
#btnFire{background:rgba(180,30,30,0.6);border-color:rgba(255,80,80,0.8)}
#joyBase{position:fixed;left:14px;bottom:78px;width:136px;height:136px;border-radius:50%;background:rgba(168,85,247,0.1);border:2.5px solid rgba(168,85,247,0.45);display:none;touch-action:none;z-index:8}
#joyStick{position:fixed;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(220,170,255,0.95),rgba(140,60,220,0.85));border:2.5px solid rgba(240,200,255,0.9);display:none;transform:translate(-50%,-50%);pointer-events:none;z-index:9}
#modeToggle{position:fixed;bottom:12px;left:10px;z-index:8;display:none;background:rgba(28,8,62,0.88);border:1.5px solid rgba(168,85,247,0.5);border-radius:16px;padding:5px 10px;color:#c084fc;font-size:10px;font-family:'Fredoka One',cursive;cursor:pointer;touch-action:manipulation}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div class="ui-left">
    <div class="ui-label">SCORE</div>
    <div class="ui-score" id="scoreEl">0</div>
    <div class="ui-label" style="margin-top:4px">LEVEL</div>
    <div class="ui-level" id="levelEl">1</div>
  </div>
  <div class="ui-right">
    <div id="livesEl" class="ui-lives"></div>
    <div class="ui-label" style="margin-top:4px;text-align:right">TIME</div>
    <div class="ui-val" id="timerEl" style="text-align:right">60s</div>
  </div>
</div>
<div id="msg"></div>
<div id="levelup"></div>
<div id="lvlbar">
  <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <div class="bar-lbl" id="barLbl">0 / 30 pts &rarr; Niv 2</div>
</div>
<div id="actionBtns">
  <div class="action-btn" id="btnFire" ontouchstart="startFiring()" ontouchend="stopFiring()">&#x1F52B;<br>Mitraille</div>
</div>
<div id="joyBase"></div>
<div id="joyStick"></div>
<button id="modeToggle" onclick="toggleInputMode()">Joystick</button>
<div id="panel">
  <h2 style="font-size:36px;margin-bottom:0;letter-spacing:5px;text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,165,0,0.4)">&#x2693; HORMUZ</h2>
  <p style="font-size:12px;color:#c9aaee;margin-bottom:14px">Save drowning chicks &amp; survive the river!</p>

  <button class="btn" id="btnPlay" onclick="startGame()" disabled style="opacity:0.5;font-size:20px;padding:18px;letter-spacing:3px;border-radius:16px;box-shadow:0 0 30px rgba(22,163,74,0.5)">&#x23F3; Loading...</button>

  <div id="francStatus" style="margin:10px 0 4px;padding:12px 14px;background:rgba(120,40,20,0.5);border:1.5px solid rgba(255,140,60,0.5);border-radius:14px;font-size:13px;font-weight:bold;display:none;cursor:pointer" onclick="openWallet()"></div>

  <button class="btn" id="btnWallet" onclick="openWallet()" style="background:linear-gradient(135deg,#7c3aed,#4c1d95);margin-top:6px;display:none;font-size:14px">&#x1F48E; TAP TO UNLOCK 10 LIVES</button>

  <div style="margin-top:12px;padding:10px 12px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.25);border-radius:12px;font-size:11px;text-align:left">
    <div style="color:#a855f7;font-weight:bold;margin-bottom:6px">&#x1F48E; $FRANC RULES</div>
    <div style="color:#ff8888">&#x1F90D; Without $FRANC: <b style="color:#fff">1 life</b> only</div>
    <div style="color:#a3e635;margin-top:4px">&#x1F49A; Holding $FRANC: <b style="color:#FFD700">10 lives</b> + bonuses</div>
  </div>
</div>
