function triggerShakeSoft(){shk=1;shkD=3;}

function updateNewObstacles(){
  if(!S||!S.running)return;

  // ── POUSSINS MARCHEURS sur la berge — même logique exacte que les tortues ──
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];if(!o||o.type!=='chick_walking')continue;
    try{
    if(o.state==='walking_vertical'){
      o.y+=o.vy;
      o.walkPhase+=0.16;
      const reachedTurn=o.vertDir>0?(o.y>=o.turnY):(o.y<=o.turnY);
      if(reachedTurn){
        o.state='walking_horizontal';
        o.vy=0;
        o.vx=o.side==='left'?0.65:-0.65;
      }
      if(o.y>H()+50||o.y<-60){objs.splice(i,1);continue;}
    } else if(o.state==='walking_horizontal'){
      o.x+=o.vx;
      o.walkPhase+=0.18;
      // Saut quand le bord avant du poussin touche exactement la rivière (jamais dans l'eau)
      const reached=o.side==='left'?(o.x+o.w>=o.targetEdgeX):(o.x<=o.targetEdgeX);
      if(reached){
        o.state='jumping';
        o.jumpT=0;
        o.jumpStartX=o.x;o.jumpStartY=o.y;
        const ri=RL(),rw=RW();
        o.jumpEndX=o.side==='left'?(ri+rw*0.3+Math.random()*rw*0.2):(ri+rw*0.5+Math.random()*rw*0.2);
        o.jumpEndY=o.y+15+Math.random()*20;
      }
    } else if(o.state==='jumping'){
      o.jumpT+=0.04;
      const t=o.jumpT;
      if(t>=1){
        // Atterrissage : splash et conversion en poussin normal dans la rivière
        const cx=o.jumpEndX+o.w/2,cy=o.jumpEndY+o.h/2;
        if(parts.length<280){
          for(let p=0;p<10;p++){
            const a=Math.random()*Math.PI*2-Math.PI/2,s=1.5+Math.random()*3;
            parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:14+Math.random()*10,maxLife:24,color:p%2===0?'#88ccff':'#cce8ff',r:1.5+Math.random()*1.5,type:'pop'});
          }
        }
        objs.splice(i,1);
        objs.push({type:'chick',x:o.jumpEndX,y:o.jumpEndY,w:o.w,h:o.h,
          speed:o.speed,bob:o.bob,sos:o.sos,sz:o.sz,pts:o.pts,wb:o.wb});
      } else {
        o.x=o.jumpStartX+(o.jumpEndX-o.jumpStartX)*t;
        const arc=Math.sin(t*Math.PI)*45;
        o.y=o.jumpStartY+(o.jumpEndY-o.jumpStartY)*t-arc;
        o.rot=(o.side==='left'?1:-1)*t*0.4;
      }
    } else {
      // fallback : état inconnu → supprimer
      objs.splice(i,1);continue;
    }
    if(o.y>H()+50){objs.splice(i,1);continue;}
    }catch(e){console.warn('chick_walking error:',e);if(objs[i])objs.splice(i,1);}
  }

  // ── TORTUES MARCHEUSES : marche le long de la berge → tourne → marche vers l'eau → saut ──
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];if(!o||o.type!=='turtle_walking')continue;
    try{
    if(o.state==='walking_vertical'){
      // Marche le long de la berge (haut↔bas)
      o.y+=o.vy;
      o.walkPhase+=0.16;
      // Atteint le point de virage → tourne vers l'eau
      const reachedTurn=o.verticalDir>0?(o.y>=o.turnY):(o.y<=o.turnY);
      if(reachedTurn){
        o.state='walking_horizontal';
        o.vy=0;
        o.vx=o.side==='left'?0.65:-0.65;
      }
      // Sortie d'écran si jamais elle dépasse sans avoir tourné
      if(o.y>H()+50||o.y<-60){objs.splice(i,1);continue;}
    } else if(o.state==='walking_horizontal'){
      // Marche horizontalement vers l'eau
      o.x+=o.vx;
      o.walkPhase+=0.18;
      // Atteint le bord de la rivière → déclenchement du saut
      const reached=o.side==='left'?(o.x>=o.targetEdgeX):(o.x<=o.targetEdgeX);
      if(reached){
        o.state='jumping';
        o.jumpT=0;
        o.jumpStartX=o.x;o.jumpStartY=o.y;
        const ri=RL(),rw=RW();
        o.jumpEndX=o.side==='left'?(ri+rw*0.3+Math.random()*rw*0.2):(ri+rw*0.5+Math.random()*rw*0.2);
        o.jumpEndY=o.y+15+Math.random()*20;
      }
    } else if(o.state==='jumping'){
      o.jumpT+=0.04; // 25 frames pour le saut complet
      const t=o.jumpT;
      if(t>=1){
        // Atterrissage : éclaboussure et conversion en tortue normale flottante
        const cx=o.jumpEndX+o.w/2,cy=o.jumpEndY+o.h/2;
        // Splash : particules d'eau bleues
        if(parts.length<280){
          for(let p=0;p<14;p++){
            const a=Math.random()*Math.PI*2-Math.PI/2,s=2+Math.random()*3.5;
            parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:18+Math.random()*12,maxLife:30,color:p%2===0?'#88ccff':'#cce8ff',r:2+Math.random()*1.5,type:'pop'});
          }
        }
        // Remplacer par une vraie tortue qui descend
        objs.splice(i,1);
        const spd=(1.3+getLv()*0.35)*0.85*0.338;
        objs.push({type:'turtle',x:o.jumpEndX,y:o.jumpEndY,w:o.w,h:o.h,speed:spd*.35,wb:{wx:0.6+Math.random()*0.6,wf:0.018+Math.random()*.01,wp:Math.random()*Math.PI*2},rot:(Math.random()-.5)*0.4,rotSp:0,hp:3,maxHp:3});
      } else {
        // Trajectoire d'arc parabolique
        o.x=o.jumpStartX+(o.jumpEndX-o.jumpStartX)*t;
        const arc=Math.sin(t*Math.PI)*45; // hauteur d'arc
        o.y=o.jumpStartY+(o.jumpEndY-o.jumpStartY)*t-arc;
        o.rot=(o.side==='left'?1:-1)*t*0.4;
      }
    }
    // Sortie d'écran si trop bas
    if(o.y>H()+50){objs.splice(i,1);continue;}
    }catch(e){console.warn('turtle_walking update error:',e);if(objs[i])objs.splice(i,1);}
  }

  // ── HIPPO phase machine ──
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];if(!o||o.type!=='hippo')continue;
    o.ripple=(o.ripple||0)+0.06;
    o.phaseTimer--;
    if(o.phase==='submerged'){
      // Slowly drift down, barely visible
      o.y+=o.speed*.4;
      if(o.phaseTimer<=0){
        o.phase='emerging';o.phaseTimer=80;
        spawnB(o.x+o.w/2,o.y+o.h/2,'#88ccff',10);
      }
    } else if(o.phase==='emerging'){
      o.y+=o.speed*.2;
      if(o.phaseTimer<=0){o.phase='surface';o.phaseTimer=140+Math.floor(Math.random()*80);}
    } else if(o.phase==='surface'){
      o.y+=o.speed;
      if(o.phaseTimer<=0){
        o.phase='diving';o.phaseTimer=50;
        // teleport to new x when fully submerged
        o._nextX=RL()+Math.floor(Math.random()*(RW()-o.w));
      }
    } else if(o.phase==='diving'){
      if(o.phaseTimer<=0){
        o.x=o._nextX||o.x;o.phase='submerged';o.phaseTimer=120+Math.floor(Math.random()*90);
      }
    }
    if(o.y>H()+100)objs.splice(i,1);
  }

  // ── EAGLE: circle then dive ──
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];if(!o||o.type!=='eagle')continue;
    if(o.phase==='circle'){
      o.circleAngle=(o.circleAngle||0)+0.04;
      // Hover at top while circling
      o.x=o.targetX+Math.cos(o.circleAngle)*(o.circleR||60)-o.w/2;
      o.y=60+Math.sin(o.circleAngle*0.5)*20;
      o.diveTimer--;
      if(o.diveTimer<=0){
        o.phase='diving';
        // Aim at boat
        const dx=(boat.x+boat.w/2)-(o.x+o.w/2),dy=(boat.y+boat.h/2)-(o.y+o.h/2);
        const dist=Math.hypot(dx,dy)||1;const sp=16;
        o.vx=dx/dist*sp;o.vy=dy/dist*sp;
      }
    } else if(o.phase==='diving'){
      o.x+=o.vx;o.y+=o.vy;
      if(o.y>H()+60||o.x<-60||o.x>W()+60)objs.splice(i,1);
    }
    if(o.x<-100||o.x>W()+100)objs.splice(i,1);
  }

  // ── MOSQUITO: follows boat with delay ──
  for(const o of objs){
    if(o.type!=='mosquito')continue;
    o.buzz=(o.buzz||0)+0.12;
    // Gradually steer toward boat
    const tx=boat.x+boat.w/2,ty=boat.y+boat.h/2;
    const dx=tx-(o.x+o.w/2),dy=ty-(o.y+o.h/2);
    const dist=Math.hypot(dx,dy)||1;
    o.vx=(o.vx||0)*0.95+(dx/dist)*0.4;
    o.vy=(o.vy||o.speed)*0.95+(dy/dist)*0.2+o.speed*0.3;
    o.x+=o.vx;o.y+=o.vy;
    o.x=Math.max(RL(),Math.min(RR()-o.w,o.x));
  }

  // ── SNAKE: horizontal sinewave ──
  for(const o of objs){
    if(o.type!=='snake')continue;
    o.phase=(o.phase||0)+0.04;
    o.x=o.baseX+Math.sin(o.phase)*o.amplitude;
    o.x=Math.max(RL(),Math.min(RR()-o.w,o.x));
  }

  // ── BARREL: chain explosion check ──
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];if(!o||o.type!=='barrel')continue;
    for(const e of exps){
      if(Math.hypot(e.x-(o.x+o.w/2),e.y-(o.y+o.h/2))<e.r+o.w/2){
        trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);break;
      }
    }
  }

  // ── INTER-OBSTACLE COLLISIONS ──
  // Creatures = croco/shark/enemy/homing → skull+blood on death
  // Dumb obstacles = rock/trunk/mine/barrel → tiny spark puff
  // Limit to 1 collision check per frame per object (use cooldown)
  const COLLIDABLE=['rock','trunk','mine','enemy','homing_enemy','croco','shark','hippo','barrel','turtle'];
  const CREATURES=['croco','shark','enemy','homing_enemy','hippo'];
  for(let i=objs.length-1;i>=0;i--){
    if(!objs[i])continue;
    const a=objs[i];
    if(!COLLIDABLE.includes(a.type))continue;
    if((a.colCD||0)>0){a.colCD--;continue;} // cooldown prevents repeated hits
    for(let j=i-1;j>=0;j--){
      if(!objs[j])continue;
      const b=objs[j];
      if(!COLLIDABLE.includes(b.type))continue;
      if((b.colCD||0)>0)continue;
      // Boats don't destroy each other
      if((a.type==='enemy'||a.type==='homing_enemy')&&(b.type==='enemy'||b.type==='homing_enemy'))continue;
      if(!rO(a.x+3,a.y+3,a.w-6,a.h-6,b.x+3,b.y+3,b.w-6,b.h-6))continue;

      const cx=(a.x+a.w/2+b.x+b.w/2)/2;
      const cy=(a.y+a.h/2+b.y+b.h/2)/2;
      const isCreatureA=CREATURES.includes(a.type);
      const isCreatureB=CREATURES.includes(b.type);

      // Set cooldown on both to avoid repeated triggers
      a.colCD=30;b.colCD=30;

      // Visual effect: skull for creature death, tiny puff otherwise
      const showSkull=isCreatureA||isCreatureB;
      if(showSkull){
        savFX.push({x:cx,y:cy-10,life:55,maxLife:55,text:'💀',color:'#ff2222',size:24});
        // tiny blood splat
        if(parts.length<280)for(let p=0;p<6;p++){const a2=Math.random()*Math.PI*2,s=1+Math.random()*2;parts.push({x:cx,y:cy,vx:Math.cos(a2)*s,vy:Math.sin(a2)*s,life:18+Math.random()*12,maxLife:30,color:'#cc0000',r:2+Math.random()*2,type:'pop'});}
      } else {
        // Tiny spark puff — just 4 particles, no explosion ring
        if(parts.length<280)for(let p=0;p<4;p++){const a2=Math.random()*Math.PI*2,s=0.8+Math.random()*1.5;parts.push({x:cx,y:cy,vx:Math.cos(a2)*s,vy:Math.sin(a2)*s,life:12+Math.random()*8,maxLife:20,color:['#ffaa00','#ffdd88'][p%2],r:2+Math.random()*2,type:'pop'});}
      }

      // Damage — rock/trunk always split on first collision
      const ALWAYS_SPLIT=['rock','trunk'];
      a.hp=(a.hp||2)-1;b.hp=(b.hp||2)-1;
      let removedI=false,removedJ=false;
      if(a.hp<=0||ALWAYS_SPLIT.includes(a.type)){
        if(a.type==='rock'||a.type==='trunk'){splitObject(a,i);removedI=true;}
        else{objs.splice(i,1);removedI=true;}
      }
      if(!removedI&&(b.hp<=0||ALWAYS_SPLIT.includes(b.type))){
        if(b.type==='rock'||b.type==='trunk'){splitObject(b,j);}
        else objs.splice(j,1);
      }
      if(removedI)break;
    }
  }

  // ── COMBO timer decay ──
  if(comboTimer>0){comboTimer--;if(comboTimer<=0){comboCount=0;comboMult=1;}}

  // ── WEATHER system — 10s ramp in / 30s full / 10s ramp out ──
  if(weather.timer>0){
    weather.timer--;
    const totalF=WEATHER_TOTAL*60;
    const elapsed=(totalF-weather.timer);
    const rampInF=WEATHER_RAMP_IN*60;
    const rampOutF=WEATHER_RAMP_OUT*60;
    if(elapsed<rampInF){
      weather.intensity=elapsed/rampInF; // fade in
    } else if(weather.timer<rampOutF){
      weather.intensity=weather.timer/rampOutF; // fade out
    } else {
      weather.intensity=1.0; // full
    }
    if(weather.timer<=0){weather.type='clear';weather.intensity=0;}
  } else {
    if(weather.type!=='clear'){weather.type='clear';weather.intensity=0;}
  }
}

// ── HIPPO ──
function dHippo(o){
  const cx=o.x+o.w/2,cy=o.y+o.h/2,t2=Date.now();
  ctx.save();
  const phase=o.phase||'submerged';
  const emerge=phase==='emerging'?1-(o.phaseTimer/80):phase==='surface'?1:phase==='submerging'?(o.phaseTimer/60):0;

  // Marqueur double cercle TOUJOURS visible pour signaler la présence (même submergé)
  // Quand submergé : marqueur plus prononcé et animé pour avertir de sa position
  const submergedFactor=1-emerge; // 1 quand totalement submergé, 0 quand en surface
  // Cercle extérieur
  ctx.strokeStyle=`rgba(100,180,255,${0.35+submergedFactor*0.25})`;
  ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(cx,cy+10,o.w*.7,12,0,0,Math.PI*2);ctx.stroke();
  // Cercle intérieur animé
  ctx.beginPath();ctx.ellipse(cx,cy+10,o.w*.5+Math.sin(o.ripple)*4,8,0,0,Math.PI*2);ctx.stroke();
  // Quand submergé : ajouter un 3e cercle d'avertissement et des bulles qui montent
  if(submergedFactor>0.3){
    ctx.strokeStyle=`rgba(180,220,255,${submergedFactor*0.5})`;
    ctx.lineWidth=2;
    const pulseR=o.w*.35+Math.sin(o.ripple*1.5)*6;
    ctx.beginPath();ctx.ellipse(cx,cy+8,pulseR,pulseR*0.55,0,0,Math.PI*2);ctx.stroke();
    // Petites bulles qui montent
    ctx.fillStyle=`rgba(200,230,255,${submergedFactor*0.55})`;
    for(let bi=0;bi<3;bi++){
      const ba=o.ripple*0.7+bi*2.1;
      const bx=cx+Math.sin(ba)*o.w*0.25;
      const by=cy+8-((t2*0.05+bi*40)%30);
      const br=1.5+Math.sin(ba)*0.5;
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();
    }
  }

  if(emerge>0.05){
    ctx.globalAlpha=Math.min(1,emerge*1.5);
    if(hippoLoaded&&imgHippo.naturalWidth>0){
      // Image hippo : on ne montre que le sommet (museau, oreilles, yeux) — comme un vrai hippo qui nage
      const drawW=o.w*1.35,drawH=o.h*1.35;
      const dy=cy-emerge*18-drawH/2;
      ctx.save();
      // Visible : 35% à 60% selon l'émersion (au lieu de 45-90 %) → toujours immergé jusqu'au museau
      const visibleH=drawH*(0.32+emerge*0.28);
      ctx.beginPath();
      ctx.rect(cx-drawW/2,dy,drawW,visibleH);
      ctx.clip();
      ctx.drawImage(imgHippo,cx-drawW/2,dy,drawW,drawH);
      ctx.restore();
      // Petite ligne d'eau au niveau de la coupure pour effet "ligne de flottaison"
      const waterY=dy+visibleH;
      ctx.strokeStyle='rgba(140,200,255,0.5)';ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let xx=-drawW/2;xx<drawW/2;xx+=4){
        const wy=waterY+Math.sin(xx*0.15+o.ripple*2)*1.5;
        if(xx===-drawW/2)ctx.moveTo(cx+xx,wy);
        else ctx.lineTo(cx+xx,wy);
      }
      ctx.stroke();
    } else {
      // Fallback dessin Canvas — version aussi plus immergée
      const subOff=emerge*15; // au lieu de 20, plus subtil
      ctx.fillStyle='#4a6e3a';ctx.beginPath();ctx.ellipse(cx,cy+12-subOff,o.w*.4,o.h*.22,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5a8040';ctx.beginPath();ctx.ellipse(cx,cy-emerge*12,o.w*.3,o.h*.20,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6a9850';
      ctx.beginPath();ctx.ellipse(cx-8,cy-emerge*16,7,5,-.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+8,cy-emerge*16,7,5,.2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2a3e18';
      ctx.beginPath();ctx.ellipse(cx-6,cy-emerge*17,2,1.5,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+6,cy-emerge*17,2,1.5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffe066';ctx.beginPath();ctx.ellipse(cx-10,cy-emerge*14,4,3,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+10,cy-emerge*14,4,3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#222';ctx.beginPath();ctx.arc(cx-10,cy-emerge*14,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx+10,cy-emerge*14,2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // HP bar
  if(o.hp<o.maxHp){
    const bw=o.w+8,bx=o.x-4,by2=o.y-10;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx,by2,bw,5);
    ctx.fillStyle=o.hp>5?'#44ff44':o.hp>2?'#ffaa00':'#ff3333';
    ctx.fillRect(bx,by2,bw*(o.hp/o.maxHp),5);
  }
  ctx.restore();
}

// ── CURRENT ZONE ──
function dCurrentZone(o){
  const t2=Date.now(),ri=RL();
  ctx.save();ctx.globalAlpha=0.22;
  // Arrow fill
  ctx.fillStyle=o.dir>0?'rgba(100,180,255,0.3)':'rgba(80,160,255,0.3)';
  ctx.fillRect(o.x,o.y,o.w,o.h);
  // Flowing arrows
  const arrowSpacing=40;
  const offset=(t2*.04)%(arrowSpacing);
  ctx.fillStyle='rgba(160,220,255,0.7)';
  for(let ax=o.x+offset;ax<o.x+o.w;ax+=arrowSpacing){
    const ay=o.y+o.h/2;
    ctx.beginPath();
    if(o.dir>0){ctx.moveTo(ax,ay-6);ctx.lineTo(ax+12,ay);ctx.lineTo(ax,ay+6);}
    else{ctx.moveTo(ax+12,ay-6);ctx.lineTo(ax,ay);ctx.lineTo(ax+12,ay+6);}
    ctx.closePath();ctx.fill();
  }
  ctx.globalAlpha=1;
  // Border dashes
  ctx.strokeStyle='rgba(100,200,255,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
  ctx.strokeRect(o.x,o.y,o.w,o.h);ctx.setLineDash([]);
  ctx.restore();
}

// ── MOSQUITO SWARM ──
function dMosquito(o){
  const cx=o.x+o.w/2,cy=o.y+o.h/2,t2=Date.now();
  ctx.save();ctx.translate(cx,cy);
  // Cloud haze
  ctx.fillStyle='rgba(80,100,40,0.18)';ctx.beginPath();ctx.ellipse(0,0,20,15,0,0,Math.PI*2);ctx.fill();
  // Individual bugs
  ctx.fillStyle='#556b2f';
  for(const s of o.swarm){
    const bx=Math.cos(s.a+t2*s.s)*s.r,by=Math.sin(s.a+t2*s.s)*s.r*.7;
    ctx.save();ctx.translate(bx,by);ctx.rotate(s.a+t2*s.s+Math.PI/2);
    ctx.fillStyle='#2a3010';ctx.fillRect(-1,-3,2,5);
    ctx.strokeStyle='rgba(100,120,60,0.8)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.ellipse(-4,0,3,1.5,.3,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(4,0,3,1.5,-.3,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  // Warning icon
  ctx.fillStyle='rgba(200,180,0,0.8)';ctx.font='bold 11px Bangers,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('😵',0,-22);
  ctx.restore();
}

// ── SNAKE ──
function dSnake(o){
  if(!o.segs||o.segs.length<2)return;
  ctx.save();
  // Body gradient
  for(let s=o.segs.length-1;s>0;s--){
    const pct=1-s/o.segs.length;
    const r=3+pct*3,alpha=0.6+pct*0.4;
    ctx.strokeStyle=`rgba(${Math.floor(60+pct*40)},${Math.floor(100+pct*50)},${Math.floor(20+pct*20)},${alpha})`;
    ctx.lineWidth=r*2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(o.segs[s].x,o.segs[s].y);ctx.lineTo(o.segs[s-1].x,o.segs[s-1].y);ctx.stroke();
  }
  // Scale marks
  ctx.strokeStyle='rgba(30,60,10,0.5)';ctx.lineWidth=0.8;
  for(let s=2;s<o.segs.length;s+=3){
    ctx.beginPath();ctx.arc(o.segs[s].x,o.segs[s].y,3,0,Math.PI*2);ctx.stroke();
  }
  // Head
  const h=o.segs[0],h2=o.segs[1];
  const ang=Math.atan2(h.y-h2.y,h.x-h2.x);
  ctx.save();ctx.translate(h.x,h.y);ctx.rotate(ang);
  ctx.fillStyle='#3a6018';ctx.beginPath();ctx.ellipse(0,0,8,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(3,-2,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,2,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(3,-2,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,2,1,0,Math.PI*2);ctx.fill();
  // Tongue
  ctx.strokeStyle='#cc2200';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(13,0);ctx.moveTo(13,0);ctx.lineTo(16,-2);ctx.moveTo(13,0);ctx.lineTo(16,2);ctx.stroke();
  ctx.restore();
  ctx.restore();
}

// ── BARREL ──
function dBarrel(o){
  const bob=Math.sin(Date.now()*.008+o.bob)*2,cx=o.x+o.w/2,cy=o.y+o.h/2+bob;
  ctx.save();ctx.translate(cx,cy);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(3,o.h/2+2,o.w/2-2,5,0,0,Math.PI*2);ctx.fill();
  // Staves
  const g=ctx.createLinearGradient(-o.w/2,0,o.w/2,0);g.addColorStop(0,'#5a3010');g.addColorStop(0.3,'#8b5a2b');g.addColorStop(0.7,'#7a4a20');g.addColorStop(1,'#4a2808');
  ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,0,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
  // Hoops
  ctx.strokeStyle='#2a1a08';ctx.lineWidth=3;
  for(const oy of[-o.h*.25,0,o.h*.25]){ctx.beginPath();ctx.ellipse(0,oy,o.w/2-1,4,0,0,Math.PI*2);ctx.stroke();}
  // Skull = explosive warning
  ctx.font='12px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('💣',0,0);
  // Blink when hp=1 (after first hit — but barrels are 1hp so no blink needed)
  ctx.restore();
}

// ── EAGLE ──
function dEagle(o){
  const t2=Date.now();
  ctx.save();ctx.translate(o.x+o.w/2,o.y+o.h/2);
  // Orientation selon direction de vol
  const flipX=o.flipX||1; // -1 = vole vers la droite, 1 = vers la gauche (PNG natif)
  ctx.scale(flipX,1);
  // Légère rotation oblique selon trajectoire
  const glideAngle=Math.atan2(o.vy||0,Math.abs(o.vx||1))*0.4;
  ctx.rotate(glideAngle);
  if(eagleLoaded&&imgEagle.naturalWidth>0){
    const drawW=o.w*1.4,drawH=o.h*1.4;
    // Battement d'ailes
    const flapScale=1+Math.sin(t2*.018)*0.06;
    ctx.scale(1,flapScale);
    ctx.drawImage(imgEagle,-drawW/2,-drawH/2,drawW,drawH);
  } else {
    const flap=Math.sin(t2*.12)*0.4;
    ctx.fillStyle='#3a2a10';
    ctx.save();ctx.rotate(-flap);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-o.w*.6,-4);ctx.lineTo(-o.w*.5,6);ctx.closePath();ctx.fill();ctx.restore();
    ctx.save();ctx.rotate(flap);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(o.w*.6,-4);ctx.lineTo(o.w*.5,6);ctx.closePath();ctx.fill();ctx.restore();
    ctx.fillStyle='#5a4020';ctx.beginPath();ctx.ellipse(0,0,7,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.arc(0,-8,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8a020';ctx.beginPath();ctx.moveTo(-3,-5);ctx.lineTo(3,-5);ctx.lineTo(0,-1);ctx.closePath();ctx.fill();
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,-9,2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ── GOLDEN CHICK ──
function dGoldenChick(o){
  const bob=Math.sin(Date.now()*.012+o.bob)*4;
  const sos=Math.sin(Date.now()*.03+o.sos);
  const t2=Date.now();
  ctx.save();ctx.translate(o.x+o.w/2,o.y+o.h/2+bob);ctx.rotate(sos*.08);
  // Golden glow
  const pulse=0.6+Math.sin(t2*.015)*0.4;
  ctx.shadowColor='#FFD700';ctx.shadowBlur=20*pulse;
  // Sparks
  for(let sp=0;sp<6;sp++){
    const sa=sp/6*Math.PI*2+t2*.02;const sr=16+Math.sin(t2*.03+sp)*4;
    ctx.fillStyle=`rgba(255,215,0,${0.4+Math.sin(t2*.05+sp)*.3})`;
    ctx.beginPath();ctx.arc(Math.cos(sa)*sr,Math.sin(sa)*sr,1.5,0,Math.PI*2);ctx.fill();
  }
  // Body (golden version of chick)
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.ellipse(0,4,10,9,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(1,-6,8,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.ellipse(-1,2,7,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-2.5,-7.5,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-7.5,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(-2.5,-8.5,1,1);ctx.fillRect(4,-8.5,1,1);
  ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(-1.5,-3.5);ctx.lineTo(3.5,-3.5);ctx.lineTo(1,-1);ctx.closePath();ctx.fill();
  // Wings
  ctx.fillStyle='#f59e0b';ctx.save();ctx.translate(-10,1);ctx.rotate(-0.8+Math.sin(t2*.04)*.4);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(10,1);ctx.rotate(0.8-Math.sin(t2*.04)*.4);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // Badge 10pt + life
  ctx.shadowBlur=0;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.arc(12,-14,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 7px Bangers,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('+1❤',12,-14);
  // Countdown bar
  const pct=o.life/300;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(-14,14,28,4);
  ctx.fillStyle=pct>0.5?'#FFD700':pct>0.25?'#ff9900':'#ff4400';ctx.fillRect(-14,14,28*pct,4);
  ctx.restore();
}

// ── DRAW COMBO HUD ──
function drawComboHUD(){
  if(comboMult<=1&&comboCount<3)return;
  const t2=Date.now(),pulse=0.8+Math.sin(t2*.1)*.2;
  ctx.save();ctx.globalAlpha=pulse;
  // Background pill
  const txt=comboMult>1?'x'+comboMult+' COMBO!':'2 in a row...';
  const col=comboMult>1?'#FFD700':'#aaa';
  ctx.font='bold 22px Bangers,cursive';ctx.textAlign='center';ctx.fillStyle='#FFD700';
  ctx.shadowColor='#FFD700';ctx.shadowBlur=15;
  ctx.fillText('x2 COMBO!',W()/2,50);
  // Combo timer bar
  const pct=comboTimer/300;
  ctx.globalAlpha=0.6;ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W()/2-50,58,100,5);
  ctx.fillStyle='#FFD700';ctx.fillRect(W()/2-50,58,100*pct,5);
  ctx.restore();
}

// ── DRAW SLOW OVERLAY ──
function drawSlowOverlay(){
  if(!S||!S.slowTimer||S.slowTimer<=0)return;
  const alpha=Math.min(0.18,S.slowTimer/180*.18);
  ctx.fillStyle=`rgba(80,120,40,${alpha})`;ctx.fillRect(0,0,W(),H());
  ctx.fillStyle='rgba(120,180,60,0.6)';ctx.font='bold 14px Bangers,cursive';ctx.textAlign='center';
  ctx.fillText('😵 SLOWED!',W()/2,H()/2-60);
}
