<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>⚓ Hormuz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#060410;overflow:hidden;width:100vw;height:100vh;font-family:'Fredoka One',cursive}
#gc{position:fixed;inset:0;z-index:1}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;z-index:5;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent)}
.ui-block{display:flex;flex-direction:column;align-items:center}
.ui-label{font-size:9px;color:#a78bca;letter-spacing:1px;text-transform:uppercase}
.ui-val{font-size:17px;font-family:'Bangers',cursive;letter-spacing:2px;color:#FFD700}
#msg{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:58px;color:#fff;text-shadow:0 0 40px #fff;opacity:0;transition:.3s;z-index:15;pointer-events:none;white-space:nowrap;font-family:'Bangers',cursive;letter-spacing:5px}
#msg.show{opacity:1}
#msg.gameover{color:#cc0000;animation:bpulse .5s ease-in-out infinite alternate}
@keyframes bpulse{0%{color:#880000;transform:translate(-50%,-50%) scale(0.93)}100%{color:#ff0000;transform:translate(-50%,-50%) scale(1.08)}}
#levelup{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);font-size:38px;color:#FFD700;opacity:0;transition:.3s;z-index:15;pointer-events:none;font-family:'Bangers',cursive;letter-spacing:4px}
#levelup.show{opacity:1}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;max-height:92vh;overflow-y:auto;background:linear-gradient(145deg,rgba(10,3,28,0.98),rgba(28,8,62,0.98));color:#fff;padding:22px 18px;border-radius:22px;z-index:20;border:2px solid rgba(180,100,255,0.35);box-shadow:0 0 60px rgba(120,40,200,0.4);text-align:center}
#panel.hidden{display:none!important}
#panel h2{font-size:28px;margin-bottom:4px;color:#FFD700;font-family:'Bangers',cursive;letter-spacing:3px;text-shadow:0 0 20px #FFD700}
#panel p{font-size:11px;color:#c9aaee;margin-bottom:8px;line-height:1.5}
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:15px;background:linear-gradient(135deg,#16a34a,#15803d);cursor:pointer;color:#fff;margin-top:6px;font-family:'Bangers',cursive;letter-spacing:2px}
.btn:active{opacity:0.8;transform:scale(0.97)}
.btn-red{background:linear-gradient(135deg,#8b0000,#cc0000)}
#lvlbar{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:5;width:230px;pointer-events:none}
.bar-bg{background:rgba(0,0,0,0.6);border-radius:20px;height:10px;border:1px solid rgba(180,100,255,0.3);overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#a855f7,#FFD700);border-radius:20px;transition:width .3s}
.bar-lbl{text-align:center;font-size:9px;color:#a78bca;margin-top:2px}
#actionBtns{position:fixed;right:10px;bottom:90px;z-index:8;display:none;flex-direction:column;gap:8px;align-items:center}
.action-btn{width:60px;height:60px;border-radius:50%;border:3px solid;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:12px;line-height:1.1;text-align:center;color:#fff}
#btnShield{background:rgba(0,150,220,0.6);border-color:rgba(0,230,255,0.8)}
#btnShield.active{background:rgba(0,200,255,0.85)}
#btnFire{background:rgba(180,30,30,0.6);border-color:rgba(255,80,80,0.8)}
#joyBase{position:fixed;left:14px;bottom:78px;width:136px;height:136px;border-radius:50%;background:rgba(168,85,247,0.1);border:2.5px solid rgba(168,85,247,0.45);display:none;touch-action:none;z-index:8}
#joyStick{position:fixed;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(220,170,255,0.95),rgba(140,60,220,0.85));border:2.5px solid rgba(240,200,255,0.9);display:none;transform:translate(-50%,-50%);pointer-events:none;z-index:9}
#modeToggle{position:fixed;bottom:12px;left:10px;z-index:8;display:none;background:rgba(28,8,62,0.88);border:1.5px solid rgba(168,85,247,0.5);border-radius:16px;padding:5px 10px;color:#c084fc;font-size:10px;font-family:'Fredoka One',cursive;cursor:pointer;touch-action:manipulation}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <div class="ui-block"><div class="ui-label">VIES</div><div class="ui-val" id="livesEl">&#x2665;&#x2665;&#x2665;&#x2665;&#x2665;&#x2665;&#x2665;&#x2665;&#x2665;&#x2665;</div></div>
  <div class="ui-block"><div class="ui-label">SCORE</div><div class="ui-val" id="scoreEl">0</div></div>
  <div class="ui-block"><div class="ui-label">TEMPS</div><div class="ui-val" id="timerEl">60s</div></div>
</div>
<div id="msg"></div>
<div id="levelup"></div>
<div id="lvlbar">
  <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <div class="bar-lbl" id="barLbl">0 / 30 pts &rarr; Niv 2</div>
</div>
<div id="actionBtns">
  <div class="action-btn" id="btnShield" ontouchstart="activateShield()" ontouchend="deactivateShield()">&#x1F6E1;<br>Bouclier</div>
  <div class="action-btn" id="btnFire" ontouchstart="startFiring()" ontouchend="stopFiring()">&#x1F52B;<br>Tir</div>
</div>
<div id="joyBase"></div>
<div id="joyStick"></div>
<button id="modeToggle" onclick="toggleInputMode()">Joystick</button>
<div id="panel">
  <h2>&#x2693; Hormuz &#x1F438;</h2>
  <p>
    &#x1F425; 1pt &#xB7; &#x1F424; 2pts &#xB7; &#x1F423; 3pts<br>
    <span style="color:#FFD700">30 pts = Niveau suivant</span><br>
    &#x1F36C; Immunite 5s (Niv.7+) &#xB7; &#x1F988; Requins (Niv.7+)<br>
    &#x1F3DD; Iles (Niv.8+) &#xB7; Tir mitraillette (Niv.6+)<br>
    <span style="color:#ff9966">Niv.10: Pirates intelligents &#xB7; Niv.11: MORT SUBITE!</span><br>
    <span style="color:#a3e635;font-size:10px">&#x1F48E; $FRANC: +1 vie / 100 pts</span>
  </p>
  <button class="btn" onclick="startGame(false)">&#x25B6; JOUER</button>
  <button class="btn" style="background:linear-gradient(135deg,#7c3aed,#4c1d95);margin-top:6px" onclick="startGame(true)">&#x1F48E; JOUER avec $FRANC</button>
</div>

function getLv(){return S?Math.min(MAX_LVL,Math.floor(S.score/PTS_LVL)+1):1;}
function isMS(lv){return (lv||getLv())>=MORT_SUBITE;}

function updateUI(){
  if(!S)return;
  document.getElementById('livesEl').textContent='♥'.repeat(Math.max(0,S.lives))+'♡'.repeat(Math.max(0,MAX_LIVES-S.lives));
  document.getElementById('scoreEl').textContent=S.score;
  const t=S.time,el=document.getElementById('timerEl');
  el.textContent=t+'s';el.style.color=t<=10?'#f55':'#FFD700';
  const lv=getLv();
  if(isMS()){
    document.getElementById('barFill').style.width='100%';
    document.getElementById('barFill').style.background='linear-gradient(90deg,#ff2222,#ff8800)';
    document.getElementById('barLbl').textContent='MORT SUBITE — Score: '+S.score;
  } else {
    const prog=(S.score%PTS_LVL)/PTS_LVL*100;
    document.getElementById('barFill').style.width=prog+'%';
    document.getElementById('barFill').style.background='linear-gradient(90deg,#a855f7,#FFD700)';
    document.getElementById('barLbl').textContent=(S.score%PTS_LVL)+' / '+PTS_LVL+' pts → Niv '+(lv<MAX_LVL?lv+1:'MAX');
  }
  const ab=document.getElementById('actionBtns');
  if(isMob&&lv>=6&&S.running)ab.style.display='flex';else ab.style.display='none';
  const bs=document.getElementById('btnShield');
  bs.style.opacity=shCD>0?'0.4':'1';
  if(shOn)bs.classList.add('active');else bs.classList.remove('active');
}
function iB(){return{x:W()/2-30,y:H()-200,w:60,h:76,inv:0,sink:0};}

  boat=iB();objs=[];bulls=[];pBulls=[];exps=[];parts=[];savFX=[];keys={};scY=0;frN=0;narrowPassages=[];
  spinOn=false;spinA=0;spinSp=0;spinT=0;
  shOn=false;shTimer=0;shCD=0;fireOn=false;fireCD=0;

  updateUI();showMsg('GO!',800);
  if(isMob){setMob(true);applyIM();}

}
function tickT(){
  if(!S||!S.running)return;
  S.time--;
  if(S.time<=0){loseL();if(S.lives>0)S.time=isMS()?999:30;}
  updateUI();
}
function loseL(){

  if(boat.inv>0||boat.sink>0)return;

  boat.sink=70;boat.inv=0;
  spinOn=true;spinA=0;spinSp=0.38;spinT=55;
  shk=10;shkD=22;bulls=[];
  setTimeout(()=>{if(!S||!S.running)return;boat=iB();boat.inv=INV;spinOn=false;spinA=0;},1400);
}
function gameOver(){

function showMsg(t,d,cls){clearTimeout(mTout);const el=document.getElementById('msg');el.textContent=t;el.className=cls?'show '+cls:'show';if(d<99999)mTout=setTimeout(()=>el.className='',d);}
function showLU(lv){clearTimeout(lTout);const el=document.getElementById('levelup');el.textContent=isMS(lv)?'MORT SUBITE!':'NIVEAU '+lv+' !';el.style.color=isMS(lv)?'#ff2222':'#FFD700';el.className='show';lTout=setTimeout(()=>el.className='',2500);}

// ── MOBILE ──
function setMob(on){if(!isMob)return;document.getElementById('modeToggle').style.display=on?'block':'none';if(!on){document.getElementById('joyBase').style.display='none';document.getElementById('joyStick').style.display='none';document.getElementById('actionBtns').style.display='none';}}
function applyIM(){const mb=document.getElementById('modeToggle');if(inputMode==='joystick'){mb.textContent='DRAG';showJB();}else{mb.textContent='JOYSTICK';document.getElementById('joyBase').style.display='none';document.getElementById('joyStick').style.display='none';}}
function toggleInputMode(){inputMode=inputMode==='joystick'?'drag':'joystick';try{localStorage.setItem('rm',inputMode);}catch(e){}joyAct=false;joyDX=0;joyDY=0;dragAct=false;applyIM();}
function jC(){return{x:14+68,y:H()-78-68};}
function showJB(){const jb=document.getElementById('joyBase'),js=document.getElementById('joyStick'),c=jC();jb.style.display='block';jb.style.left=(c.x-68)+'px';jb.style.top=(c.y-68)+'px';js.style.display='block';js.style.left=c.x+'px';js.style.top=c.y+'px';}
function updJS(tx,ty){const c=jC(),dx=tx-c.x,dy=ty-c.y,d=Math.hypot(dx,dy),cap=Math.min(d,JR),a=Math.atan2(dy,dx),js=document.getElementById('joyStick');js.style.left=(c.x+Math.cos(a)*cap)+'px';js.style.top=(c.y+Math.sin(a)*cap)+'px';const n=d>6?cap/JR:0;joyDX=n?Math.cos(a)*n:0;joyDY=n?Math.sin(a)*n:0;}
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0],r=C.getBoundingClientRect(),tx=t.clientX-r.left,ty=t.clientY-r.top;if(inputMode==='joystick'){joyAct=true;updJS(t.clientX,t.clientY);}else{dragAct=true;dragX=tx;dragY=ty;}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0],r=C.getBoundingClientRect(),tx=t.clientX-r.left,ty=t.clientY-r.top;if(inputMode==='joystick'){if(joyAct)updJS(t.clientX,t.clientY);}else{dragX=tx;dragY=ty;}},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(inputMode==='joystick'){joyAct=false;joyDX=0;joyDY=0;const c=jC(),js=document.getElementById('joyStick');js.style.left=c.x+'px';js.style.top=c.y+'px';}else dragAct=false;},{passive:false});

function activateShield(){if(shCD<=0&&getLv()>=6&&S&&S.running){shOn=true;shTimer=SH_MAX;}}
function deactivateShield(){shOn=false;}
function startFiring(){if(getLv()>=6&&S&&S.running)fireOn=true;}
function stopFiring(){fireOn=false;}
function doFire(){
  if(!S||!S.running||fireCD>0||getLv()<6)return;
  const bx=boat.x+boat.w/2,by=boat.y;
  let tgt=null,md=9999;
  for(const o of objs){if(o.type==='homing_enemy'){const d=Math.hypot(o.x+o.w/2-bx,o.y+o.h/2-by);if(d<md){md=d;tgt=o;}}}
  const ang=tgt?Math.atan2(tgt.y+tgt.h/2-by,tgt.x+tgt.w/2-bx):-Math.PI/2;
  pBulls.push({x:bx,y:by,vx:Math.cos(ang)*9,vy:Math.sin(ang)*9,life:80,r:5});
  fireCD=FIRE_RATE;spawnB(bx,by,'#ffdd00',2);
}
document.addEventListener('keydown',e=>{
  keys[e.key]=true;['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)&&e.preventDefault();
  if(e.key===' '||e.code==='Space'){e.preventDefault();fireOn=true;}
  if(e.key==='x'||e.key==='X')activateShield();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;if(e.key===' '||e.code==='Space')fireOn=false;if(e.key==='x'||e.key==='X')deactivateShield();});
let mX=null,mY=null;
window.addEventListener('mousemove',e=>{if(S&&S.running){mX=e.clientX;mY=e.clientY;}});

function handleInput(){
  if(!S||!S.running||boat.sink>0||spinOn)return;
  if(isMob){
    if(inputMode==='joystick'&&joyAct){const n=Math.hypot(joyDX,joyDY);if(n>0.06){const curve=n*n*.4+n*.6,a=Math.atan2(joyDY,joyDX),sp=curve*JSP;boat.x+=Math.cos(a)*sp;boat.y+=Math.sin(a)*sp;}}
    else if(inputMode==='drag'&&dragAct){boat.x+=(dragX-boat.w/2-boat.x)*DL;boat.y+=((dragY-FO)-boat.y)*DL;}
  } else {
    if(mX!==null){boat.x+=(mX-boat.w/2-boat.x)*.18;boat.y+=(mY-boat.h/2-boat.y)*.18;}
  }
  const sp=3.5;
  if(keys['ArrowLeft']||keys['a']||keys['A'])boat.x-=sp;
  if(keys['ArrowRight']||keys['d']||keys['D'])boat.x+=sp;
  if(keys['ArrowUp']||keys['w']||keys['W'])boat.y-=sp;
  if(keys['ArrowDown']||keys['s']||keys['S'])boat.y+=sp;
  boat.x=Math.max(RL()+4,Math.min(RR()-boat.w-4,boat.x));
  boat.y=Math.max(30,Math.min(H()-24,boat.y));
}

function rO(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}

function nWobble(lv){return lv>=6?{wx:(Math.random()-.5)*1.8,wf:0.018+Math.random()*.025,wp:Math.random()*Math.PI*2}:null;}

function spawnO(){
  if(!S||!S.running)return;
  const lv=getLv(),ri=RL(),rw=RW();
  const mg=Math.floor(rw*0.1);
  const rx=()=>ri+mg+Math.random()*(rw-mg*2);
  const spd=(1.3+lv*0.35)*(0.85+Math.random()*0.5);
  const types=['chick','chick','chick','rock','trunk','croco'];
  if(lv>=2)types.push('mine');
  if(lv>=3)types.push('croco','rock');
  if(lv>=4)types.push('enemy');
  if(lv>=5)types.push('whirlpool','mine');
  if(lv>=6)types.push('homing_enemy','homing_enemy');
  if(lv>=7)types.push('candy','shark','shark');
  if(lv>=8)types.push('island');
  if(lv>=11)types.push('homing_enemy','homing_enemy');
  const t=types[Math.floor(Math.random()*types.length)];
  const wb=nWobble(lv);
  if(t==='chick'){
    const r2=Math.random();let sz='s',pts=1,sw=26,sh=28;
    if(r2<0.2){sz='l';pts=3;sw=38;sh=40;}else if(r2<0.53){sz='m';pts=2;sw=32;sh=34;}
    objs.push({type:'chick',x:rx(),y:-sh,w:sw,h:sh,speed:spd*.6,bob:Math.random()*Math.PI*2,sos:Math.random()*Math.PI*2,sz,pts,wb});
  }
  else if(t==='rock'){const big=Math.random()<0.3,rw2=big?54:36,rh=big?46:34;objs.push({type:'rock',x:rx(),y:-rh,w:rw2,h:rh,speed:spd,wb});}
  else if(t==='trunk'){
    const vertical=Math.random()<0.4,len=68+Math.random()*48,thick=20+Math.random()*8;
    if(vertical)objs.push({type:'trunk',x:rx(),y:-len,w:thick,h:len,speed:spd,ang:0,vertical:true,mossPts:gMoss(),branches:[],wb});
    else objs.push({type:'trunk',x:RL()+10+Math.random()*(RW()-len-20),y:-thick,w:len,h:thick,speed:spd,ang:(Math.random()-.5)*.3,vertical:false,mossPts:gMoss(),branches:gBr(len),wb});
  }
  else if(t==='croco'){const sc=0.8+Math.random()*.4;objs.push({type:'croco',x:rx(),y:-92*sc,w:32*sc,h:82*sc,speed:spd,dir:Math.random()<.5?-1:1,sway:Math.random()*Math.PI*2,sc,tail:Math.random()*Math.PI*2,wb});}
  else if(t==='mine'){const vx=(Math.random()-.5)*2.2;objs.push({type:'mine',x:rx(),y:-28,w:28,h:28,speed:spd*.5,bob:Math.random()*Math.PI*2,vx,zig:0,zigP:45+Math.random()*60,dead:false,wb});}
  else if(t==='enemy')objs.push({type:'enemy',x:rx(),y:-110,w:100,h:110,speed:spd*.75,wb});
  else if(t==='homing_enemy'){const smart=lv>=10;objs.push({type:'homing_enemy',x:rx(),y:-110,w:100,h:110,speed:spd*.6,smart,shootTimer:40+Math.floor(Math.random()*40),vx:0,vy:spd*.6,hp:3,wb:smart?null:wb});}
  else if(t==='whirlpool')objs.push({type:'whirlpool',x:rx(),y:-80,w:80,h:80,speed:spd*.28,rot:0,wb});
  else if(t==='candy')objs.push({type:'candy',x:rx(),y:-28,w:28,h:28,speed:spd*.55,bob:Math.random()*Math.PI*2});
  else if(t==='shark'){const side=Math.random()<0.5,sx=side?ri+mg:ri+rw-mg-40;objs.push({type:'shark',x:sx,y:-60,w:40,h:60,speed:spd*.8,dir:side?1:-1,sway:Math.random()*Math.PI*2,wb});}
  else if(t==='island'){const iW=55+Math.random()*40,iH=80+Math.random()*60,ix=ri+rw*.5-iW*.5+(Math.random()-.5)*rw*.25;objs.push({type:'island',x:ix,y:-iH,w:iW,h:iH,speed:spd*.4,trees:Math.floor(2+Math.random()*3)});}
}
function gMoss(){const p=[];for(let i=0;i<6;i++)p.push({x:Math.random(),y:Math.random(),r:2+Math.random()*4});return p;}
function gBr(len){return[{x:len*.25+(Math.random()-.5)*10,side:Math.random()<.5?-1:1,l:12+Math.random()*14},{x:len*.65+(Math.random()-.5)*10,side:Math.random()<.5?-1:1,l:10+Math.random()*12}];}

function updateNarrowPassages(){
  const lv=getLv();if(lv<9)return;
  if(frN%240===0){const ri=RL(),rw=RW(),nA=rw*0.18,side=Math.random()<0.5?'left':'right';narrowPassages.push({y:-30,narrowW:nA,side,speed:1.2+lv*.25});}
  narrowPassages=narrowPassages.filter(p=>{p.y+=p.speed;return p.y<H()+60;});
}

function updateWhirlpools(){
  for(const wp of objs){
    if(wp.type!=='whirlpool')continue;
    const cx=wp.x+wp.w/2,cy=wp.y+wp.h/2,r=wp.w/2+20;
    for(let i=objs.length-1;i>=0;i--){
      const o=objs[i];if(o===wp||o.type==='whirlpool'||o.type==='chick'||o.type==='candy')continue;
      const dx=(o.x+o.w/2)-cx,dy=(o.y+o.h/2)-cy,d=Math.hypot(dx,dy);
      if(d<r&&d>1){o.x-=dx/d*2.5;o.y-=dy/d*2.5;if(d<18){spawnB(o.x+o.w/2,o.y+o.h/2,'#cc88ff',8);objs.splice(i,1);}}
    }
    if(boat.inv<=0&&boat.sink<=0){
      const bdx=(boat.x+boat.w/2)-cx,bdy=(boat.y+boat.h/2)-cy,bd=Math.hypot(bdx,bdy);
      if(bd<r+10&&bd>1){boat.x-=bdx/bd*1.5;boat.y-=bdy/bd*1.5;if(bd<22)loseL();}
    }
  }
}

function updateHomingEnemies(){
  if(!S||!S.running)return;
  for(const o of objs){
    if(o.type!=='homing_enemy')continue;
    if(o.smart){
      const dx=(boat.x+boat.w/2)-(o.x+o.w/2),dy=(boat.y+boat.h/2)-(o.y+o.h/2),dist=Math.hypot(dx,dy)||1,sp=o.speed;
      o.vx+=dx/dist*sp*.08;o.vy+=dy/dist*sp*.08;
      const cur=Math.hypot(o.vx,o.vy);if(cur>sp){o.vx=o.vx/cur*sp;o.vy=o.vy/cur*sp;}
      o.x+=o.vx;o.y+=o.vy;o.x=Math.max(RL()+4,Math.min(RR()-o.w-4,o.x));
    } else {
      o.y+=o.vy*.5;if(o.wb)o.x+=Math.sin(frN*o.wb.wf+o.wb.wp)*o.wb.wx;
    }
    // 2x shoot rate (shootTimer halved effectively)
    o.shootTimer--;
    if(o.shootTimer<=0){
      const dx=(boat.x+boat.w/2)-(o.x+o.w/2),dy=(boat.y+boat.h/2)-(o.y+o.h/2);
      const ang=Math.atan2(dy,dx),sp=3.5+Math.random()*2;
      // fire 2 bullets per salvo
      bulls.push({x:o.x+o.w/2,y:o.y+o.h/2,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:130,r:7});
      bulls.push({x:o.x+o.w/2+10,y:o.y+o.h/2,vx:Math.cos(ang+0.15)*sp,vy:Math.sin(ang+0.15)*sp,life:130,r:7});
      o.shootTimer=45+Math.floor(Math.random()*35);
      spawnB(o.x+o.w/2,o.y+o.h*.8,'#ff8800',4);
    }
  }
}

function updateMines(){
  if(!S||!S.running)return;
  for(let i=objs.length-1;i>=0;i--){
    if(!objs[i])continue;const o=objs[i];if(o.type!=='mine'||o.dead)continue;
    o.zig++;if(o.zig>=o.zigP){o.vx=(Math.random()-.5)*3;o.zigP=30+Math.random()*70;o.zig=0;}
    o.x+=o.vx;
    const ri=RL(),rr2=RR();
    if(o.x<=ri+2){o.x=ri+2;if(Math.random()<.5)o.vx=Math.abs(o.vx);else{if(!o.dead){o.dead=true;trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);}}continue;}
    if(o.x+o.w>=rr2-2){o.x=rr2-o.w-2;if(Math.random()<.5)o.vx=-Math.abs(o.vx);else{if(!o.dead){o.dead=true;trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);}}continue;}
    if(!objs[i])continue;
    for(let j=objs.length-1;j>=0;j--){
      if(j===i||!objs[i]||!objs[j])continue;
      const a=objs[i],b=objs[j];if(b.type==='mine'||b.type==='chick'||b.type==='candy')continue;
      if(rO(a.x+3,a.y+3,a.w-6,a.h-6,b.x,b.y,b.w,b.h)){
        if(!a.dead){a.dead=true;trigEx(a.x+a.w/2,a.y+a.h/2);spawnB(b.x+b.w/2,b.y+b.h/2,'#ff8800',10);
          const ia=objs.indexOf(a),ib=objs.indexOf(b);if(ib>-1)objs.splice(ib,1);const ia2=objs.indexOf(a);if(ia2>-1)objs.splice(ia2,1);}
        break;
      }
    }
  }
}
function trigEx(cx,cy){
  exps.push({x:cx,y:cy,r:4,maxR:82,life:50,maxLife:50});
  for(let i=0;i<36;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*8;parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:28+Math.random()*28,maxLife:56,color:['#ff4400','#ff9900','#ffdd00','#fff','#ff6600'][Math.floor(Math.random()*5)],r:2+Math.random()*5,type:'fire'});}
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=.8+Math.random()*2.5;parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-.5,life:44+Math.random()*24,maxLife:68,color:'#888',r:5+Math.random()*7,type:'smoke'});}
  shk=12;shkD=26;
}
function spawnB(cx,cy,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3;parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20+Math.random()*14,maxLife:34,color,r:3,type:'pop'});}}

// ── KEY FIX: CHICK pickup works even during immunity (inv>0) ──
// During inv/candy immunity: can collect chicks, candy; cannot be damaged
function checkCols(){
  if(colLock||!S||!S.running)return;
  if(boat.sink>0)return; // still sinking — no collisions at all
  colLock=true;
  try{
    const hb=14,bx=boat.x+hb,by=boat.y+hb,bw=boat.w-hb*2,bh=boat.h-hb*2;
    for(let i=objs.length-1;i>=0;i--){
      if(!objs[i])continue;const o=objs[i];
      if(!rO(bx,by,bw,bh,o.x,o.y,o.w,o.h))continue;
      if(o.type==='chick'){
        // ALWAYS collectible — even during immunity
        objs.splice(i,1);S.score+=o.pts;S.time=Math.min(S.time+10,99);
        savFX.push({x:o.x,y:o.y-10,life:40,pts:o.pts});spawnB(o.x+o.w/2,o.y+o.h/2,'#ffdd00',o.pts*3+4);
        if(hasFranc&&S.score>=nextFrancBonus){nextFrancBonus+=100;if(S.lives<MAX_LIVES){S.lives++;spawnB(boat.x+boat.w/2,boat.y,'#ff4444',12);}}
        updateUI();continue;
      }
      if(o.type==='candy'){
        // ALWAYS collectible — even during immunity (extends it)
        objs.splice(i,1);boat.inv=INV;spawnB(o.x+o.w/2,o.y+o.h/2,'#ff88cc',14);continue;
      }
      // All other collisions: only happen when NOT invincible
      if(boat.inv>0)continue;
      if(o.type==='mine'){if(!o.dead){o.dead=true;trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(i,1);colLock=false;loseL();return;}}
      else if(['island','rock','trunk','croco','shark','enemy','homing_enemy'].includes(o.type)){colLock=false;loseL();return;}
    }
    // Enemy bullets — only when not invincible
    if(boat.inv<=0){
      for(let i=bulls.length-1;i>=0;i--){
        if(!bulls[i])continue;const b=bulls[i];
        if(rO(bx,by,bw,bh,b.x-6,b.y-6,12,12)){
          bulls.splice(i,1);spawnB(b.x,b.y,'#ff6600',8);
          if(shOn){spawnB(boat.x+boat.w/2,boat.y+boat.h/2,'#00ffff',10);}
          else{colLock=false;loseL();return;}
        }
      }
    }
    // Player bullets vs homing enemies
    for(let i=pBulls.length-1;i>=0;i--){
      if(!pBulls[i])continue;const b=pBulls[i];let hit=false;
      for(let j=objs.length-1;j>=0;j--){
        if(!objs[j])continue;const o=objs[j];if(o.type!=='homing_enemy')continue;
        if(rO(b.x-b.r,b.y-b.r,b.r*2,b.r*2,o.x,o.y,o.w,o.h)){
          spawnB(b.x,b.y,'#ffaa00',8);o.hp--;
          if(o.hp<=0){trigEx(o.x+o.w/2,o.y+o.h/2);objs.splice(j,1);}
          hit=true;break;
        }
      }
      if(hit)pBulls.splice(i,1);
    }
  }finally{colLock=false;}
}

function update(){
  if(!S||!S.running)return;
  frN++;handleInput();
  scY+=1.2+getLv()*.28;
  updateMines();updateHomingEnemies();updateWhirlpools();updateNarrowPassages();
  if(shOn){shTimer--;if(shTimer<=0){shOn=false;shCD=SH_CD;}}
  if(shCD>0)shCD--;
  if(fireCD>0)fireCD--;
  if(fireOn)doFire();
  if((keys['x']||keys['X'])&&shCD<=0&&getLv()>=6){shOn=true;if(shTimer<=0)shTimer=SH_MAX;}
  if(spinOn){spinA+=spinSp;spinT--;if(spinT<=0)spinSp*=.90;if(Math.abs(spinSp)<.008)spinOn=false;}
  const lv=getLv();
  if(lv!==S.level&&lv<=MAX_LVL){S.level=lv;showLU(lv);spawnB(W()/2,H()/2,'#FFD700',18);spawnB(W()/2,H()/2,'#a855f7',12);}
  updateUI();
  bulls=bulls.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;return b.life>0&&b.x>RL()-20&&b.x<RR()+20&&b.y>-20&&b.y<H()+20;});
  pBulls=pBulls.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;return b.life>0&&b.x>RL()-20&&b.x<RR()+20&&b.y>-20&&b.y<H()+20;});
  for(let i=objs.length-1;i>=0;i--){
    if(!objs[i])continue;const o=objs[i];
    if(o.type!=='homing_enemy'||!o.smart) o.y+=o.speed;
    if(o.wb&&o.type!=='croco'&&o.type!=='shark'){o.x+=Math.sin(frN*o.wb.wf+o.wb.wp)*o.wb.wx;o.x=Math.max(RL()+4,Math.min(RR()-o.w-4,o.x));}
    if(o.type==='croco'){o.sway+=.04;o.x+=Math.sin(o.sway)*o.dir*.8;o.x=Math.max(RL()+4,Math.min(RR()-o.w-4,o.x));o.tail+=.09;}
    if(o.type==='shark'){o.sway+=.035;o.x+=Math.sin(o.sway)*o.dir*.9;o.x=Math.max(RL()+4,Math.min(RR()-o.w-4,o.x));}
    if(o.type==='whirlpool')o.rot+=.07;
    if(o.y>H()+140)objs.splice(i,1);
  }
  checkCols();
  if(boat.inv>0)boat.inv--;if(boat.sink>0)boat.sink--;
  for(let i=exps.length-1;i>=0;i--){const e=exps[i];e.r+=(e.maxR-e.r)*.17;e.life--;if(e.life<=0)exps.splice(i,1);}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.11;p.vx*=.96;p.life--;if(p.type==='smoke')p.r+=.08;if(p.life<=0)parts.splice(i,1);}
  savFX=savFX.filter(e=>{e.y-=.8;e.life--;return e.life>0;});
  if(shkD>0){shkD--;if(!shkD)shk=0;}
}

/* ════ DRAW ════ */
function drawScene(){
  ctx.clearRect(0,0,W(),H());ctx.fillStyle='#060410';ctx.fillRect(0,0,W(),H());
  drawRiver();drawNarrow();drawObjs();drawBullets();drawExps();
  drawBoat();drawSavFX();drawHUD();
}
function drawRiver(){
  const ri=RL(),rr=RR(),rw=RW();
  ctx.fillStyle='#0e4a8a';ctx.fillRect(ri,0,rw,H());
  const wt=Date.now()*.0008;
  for(let y=(-scY*.6%56);y<H();y+=56){ctx.fillStyle='rgba(255,255,255,0.03)';ctx.beginPath();for(let x=ri;x<=rr;x+=8)ctx.lineTo(x,y+Math.sin((x*.04)+wt+y*.02)*4);ctx.lineTo(rr,y+14);ctx.lineTo(ri,y+14);ctx.closePath();ctx.fill();}
  for(let y=(-scY*.4%38);y<H();y+=38){ctx.strokeStyle='rgba(120,190,255,0.07)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(ri+10,y);ctx.bezierCurveTo(ri+rw*.3,y+5,ri+rw*.7,y-5,rr-10,y+2);ctx.stroke();}
  drawBank(0,ri);drawBank(rr,W()-rr);
}
function drawBank(x,w){
  const g=['#175208','#1e6a09','#145006','#226614','#0e3d05','#1a5808','#0b3204'],d=['#0a2e03','#102d04','#082403'];
  for(let dy=0;dy<H();dy+=4)for(let dx=0;dx<w;dx+=4){const pct=x===0?(w-dx)/w:dx/w,hash=(dx*13+dy*7)%7;ctx.fillStyle=pct>.12?g[hash%g.length]:d[hash%d.length];ctx.fillRect(x+dx,dy,4,4);}
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(x===0?x+w-8:x,0,8,H());
  for(let dy=20;dy<H();dy+=52){const fx=x===0?x+w*.42:x+w*.45;ctx.fillStyle='#ddcc44';ctx.beginPath();ctx.arc(fx,dy,2.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#dd7777';ctx.beginPath();ctx.arc(fx+8,dy+26,1.8,0,Math.PI*2);ctx.fill();}
}
function drawNarrow(){
  if(getLv()<9)return;
  for(const p of narrowPassages){
    ctx.fillStyle='rgba(30,80,20,0.7)';
    if(p.side==='left')ctx.fillRect(RL(),p.y,p.narrowW,30);
    else ctx.fillRect(RR()-p.narrowW,p.y,p.narrowW,30);
    ctx.strokeStyle='rgba(255,255,100,0.5)';ctx.lineWidth=2;ctx.setLineDash([6,4]);
    if(p.side==='left'){ctx.beginPath();ctx.moveTo(RL()+p.narrowW,p.y);ctx.lineTo(RL()+p.narrowW,p.y+30);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(RR()-p.narrowW,p.y);ctx.lineTo(RR()-p.narrowW,p.y+30);ctx.stroke();}
    ctx.setLineDash([]);
  }
}
function drawObjs(){for(const o of objs){if(!o)continue;ctx.save();drawO(o);ctx.restore();}}
function drawO(o){
  switch(o.type){
    case'chick':dChick(o);break;case'rock':dRock(o);break;case'trunk':dTrunk(o);break;
    case'croco':dCroco(o);break;case'mine':dMine(o);break;case'enemy':dEnemyBoat(o,false);break;

}
function dChick(o){
  const bob=Math.sin(Date.now()*.01+o.bob)*3,sos=Math.sin(Date.now()*.025+o.sos),arm=Math.sin(Date.now()*.04+o.sos)*0.7;

  ctx.save();ctx.translate(o.x+o.w/2,o.y+o.h/2+bob);ctx.rotate(sos*.06);ctx.scale(sc*(1+Math.abs(sos)*.06),sc*(1/(1+Math.abs(sos)*.06)));

  ctx.fillStyle='#d4aa00';ctx.save();ctx.translate(-10,1);ctx.rotate(-0.8+arm);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,Math.PI*2);ctx.fill();ctx.restore();

  ctx.fillStyle='#d4aa00';ctx.fillRect(-5,11,3,4);ctx.fillRect(2,11,3,4);ctx.fillRect(-7,14,5,2);ctx.fillRect(2,14,5,2);
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-2.5,-7.5,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-7.5,2,0,Math.PI*2);ctx.fill();

  ctx.globalAlpha=.5+Math.abs(sos)*.5;ctx.fillStyle='#ff4400';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SOS',0,-18);ctx.globalAlpha=1;

  ctx.fillStyle='#fff';ctx.font='bold 8px Bangers,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.pts+'pt',11,-13);
  ctx.fillStyle='rgba(100,190,255,.42)';ctx.fillRect(-9,10,18,4);ctx.restore();
}
function dRock(o){
  const cx=o.x+o.w/2,cy=o.y+o.h/2,rx=o.w/2,ry=o.h/2;
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(cx+4,cy+ry+3,rx*.8,7,0,0,Math.PI*2);ctx.fill();

  rPath();ctx.fill();
  const gHL=ctx.createRadialGradient(cx-rx*.25,cy-ry*.3,rx*.05,cx,cy,rx*.9);gHL.addColorStop(0,'rgba(220,215,215,0.7)');gHL.addColorStop(1,'rgba(100,90,90,0)');ctx.fillStyle=gHL;rPath();ctx.fill();

function dTrunk(o){

  ctx.strokeStyle='#a07830';ctx.lineWidth=2.5;ctx.beginPath();ctx.ellipse(cx,cy,o.w/2,o.h/2,0,0,Math.PI*2);ctx.stroke();
  const numT=o.trees||2;
  for(let t=0;t<numT;t++){const tx=cx-o.w*.3+t*(o.w*.6/(numT-1||1)),ty=cy-o.h*.1;ctx.fillStyle='#5a3010';ctx.fillRect(tx-3,ty-20,6,22);ctx.fillStyle='#1a7820';ctx.beginPath();ctx.arc(tx,ty-22,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#22a030';ctx.beginPath();ctx.arc(tx-3,ty-26,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#22a030';ctx.beginPath();ctx.arc(tx+4,ty-24,6,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}
function dEnemyBoat(o,homing){
  const x=o.x,y=o.y,w=o.w,h=o.h,cx=w/2;ctx.save();ctx.translate(x,y);
  if(homing&&o.smart&&(Math.abs(o.vx)>.1||Math.abs(o.vy)>.1)){ctx.translate(cx,h/2);ctx.rotate(Math.atan2(o.vy,o.vx)-Math.PI/2);ctx.translate(-cx,-h/2);}
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(cx+4,h-8,w/2-6,10,0,0,Math.PI*2);ctx.fill();
  const hO=homing?'#1a0030':'#3a1a00',hM=homing?'#4a0070':'#8b4513',hD=homing?'#6a3090':'#c8844a';
  ctx.fillStyle=hO;ctx.beginPath();ctx.moveTo(cx,4);ctx.bezierCurveTo(w+8,h*.22,w+8,h*.78,cx,h+2);ctx.bezierCurveTo(-8,h*.78,-8,h*.22,cx,4);ctx.closePath();ctx.fill();
  ctx.fillStyle=hM;ctx.beginPath();ctx.moveTo(cx,7);ctx.bezierCurveTo(w+4,h*.23,w+4,h*.77,cx,h-2);ctx.bezierCurveTo(-4,h*.77,-4,h*.23,cx,7);ctx.closePath();ctx.fill();
  ctx.fillStyle=hD;ctx.beginPath();ctx.ellipse(cx,h*.52,w/2-10,h*.38,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=homing?'#8a50c0':'#a06030';ctx.lineWidth=1.5;
  for(let i=-3;i<=3;i++){const oy=h*.52+i*9;const dw=Math.sqrt(Math.max(0,Math.pow(h*.38,2)-Math.pow(oy-h*.52,2)))*(w/2-11)/(h*.38);if(dw>3){ctx.beginPath();ctx.moveTo(cx-dw,oy);ctx.lineTo(cx+dw,oy);ctx.stroke();}}
  ctx.strokeStyle=homing?'#cc88ff':'#d4a017';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,12);ctx.bezierCurveTo(w-4,h*.28,w-4,h*.62,cx,h-6);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,12);ctx.bezierCurveTo(4,h*.28,4,h*.62,cx,h-6);ctx.stroke();
  ctx.fillStyle='#222';for(const px of[cx-18,cx+18]){ctx.beginPath();ctx.arc(px,h*.7,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle=homing?'#aa66ff':'#d4a017';ctx.lineWidth=1.5;ctx.stroke();}
  ctx.fillStyle=homing?'#2a0050':'#5a3010';ctx.fillRect(cx-3,6,6,h*.8);ctx.fillStyle=homing?'#3a0060':'#7a4520';ctx.beginPath();ctx.arc(cx,8,8,0,Math.PI*2);ctx.fill();ctx.fillStyle=homing?'#2a0050':'#5a3010';ctx.fillRect(cx-8,4,16,6);
  ctx.fillStyle='#111';ctx.beginPath();ctx.moveTo(cx,8);ctx.lineTo(cx+w*.44,h*.17);ctx.lineTo(cx+w*.40,h*.64);ctx.lineTo(cx,h*.52);ctx.closePath();ctx.fill();
  ctx.fillStyle=homing?'#cc66ff':'#eee';ctx.beginPath();ctx.arc(cx+w*.24,h*.3,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx+w*.24,h*.3,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=homing?'#cc66ff':'#eee';ctx.fillRect(cx+w*.19,h*.35,4,2.5);ctx.fillRect(cx+w*.24,h*.35,4,2.5);ctx.fillRect(cx+w*.29,h*.35,4,2.5);
  ctx.strokeStyle=homing?'#cc66ff':'#eee';ctx.lineWidth=2;ctx.save();ctx.translate(cx+w*.24,h*.32);ctx.rotate(.5);ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.stroke();ctx.rotate(Math.PI*.5);ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.stroke();ctx.restore();
  ctx.fillStyle='rgba(240,235,220,.85)';ctx.beginPath();ctx.moveTo(cx,8);ctx.lineTo(cx-w*.35,h*.16);ctx.lineTo(cx-w*.28,h*.52);ctx.lineTo(cx,h*.4);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(200,170,120,.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,8);ctx.lineTo(cx+w*.4,h*.15);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,8);ctx.lineTo(cx-w*.32,h*.15);ctx.stroke();
  ctx.fillStyle=homing?'#aa44ff':'#cc0000';ctx.beginPath();ctx.moveTo(cx,4);ctx.lineTo(cx+18,7);ctx.lineTo(cx,14);ctx.closePath();ctx.fill();
  const cc=homing?'#5500aa':'#444',cg=homing?'#aa66ff':'#222';
  ctx.fillStyle=cc;ctx.save();ctx.translate(10,h*.55);ctx.rotate(-.18);ctx.beginPath();ctx.roundRect(-3,-5,20,10,3);ctx.fill();ctx.restore();ctx.fillStyle=cg;ctx.beginPath();ctx.arc(10,h*.55-1,6,0,Math.PI*2);ctx.fill();
  if(homing){ctx.strokeStyle='rgba(180,100,255,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(10,h*.55-1,9,0,Math.PI*2);ctx.stroke();}
  ctx.fillStyle=cc;ctx.save();ctx.translate(w-10,h*.58);ctx.rotate(.18);ctx.beginPath();ctx.roundRect(-17,-5,20,10,3);ctx.fill();ctx.restore();ctx.fillStyle=cg;ctx.beginPath();ctx.arc(w-10,h*.58-1,6,0,Math.PI*2);ctx.fill();
  if(homing){ctx.strokeStyle='rgba(180,100,255,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(w-10,h*.58-1,9,0,Math.PI*2);ctx.stroke();}
  const pc=homing?'#8800cc':'#8b1a1a';
  ctx.fillStyle=pc;ctx.beginPath();ctx.arc(cx-6,h*.28,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(cx-12,h*.25,13,4);ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(cx-6,h*.36,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.fillRect(cx-8,h*.35,3,3);ctx.fillRect(cx-4,h*.35,3,3);
  ctx.fillStyle=homing?'#5500aa':'#333';ctx.beginPath();ctx.arc(cx+12,h*.26,7,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(cx+6,h*.23,13,4);ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(cx+12,h*.34,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#222';ctx.fillRect(cx+10,h*.33,3,3);ctx.fillRect(cx+14,h*.33,3,3);
  ctx.fillStyle=homing?'#cc88ff':'#d4a017';ctx.beginPath();ctx.arc(w-8,h*.3,4.5,0,Math.PI*2);ctx.fill();
  if(homing&&o.smart){
    const bw=w-12;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(6,h*.86,bw,7);ctx.fillStyle=o.hp>=3?'#44ff44':o.hp===2?'#ffaa00':'#ff3333';ctx.fillRect(6,h*.86,bw*(o.hp/3),7);
    const pulse=0.28+Math.sin(Date.now()*.04)*0.18;ctx.strokeStyle='rgba(180,80,255,'+pulse+')';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(cx,h/2,w/2+12,h/2+12,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.strokeStyle='rgba(200,235,255,.5)';ctx.lineWidth=2;for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(cx+(Math.sin(Date.now()*.02+i)*6|0),h+i*4);ctx.lineTo(cx+(Math.sin(Date.now()*.02+i+1)*5|0),h+i*4+5);ctx.stroke();}
  ctx.restore();
}
function drawBullets(){
  for(const b of bulls){ctx.save();ctx.translate(b.x,b.y);const a=Math.atan2(b.vy,b.vx);ctx.rotate(a);ctx.shadowColor='#ff6600';ctx.shadowBlur=8;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,0,b.r||7,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,150,0,0.5)';ctx.beginPath();ctx.ellipse(-b.r*2,0,b.r*2,b.r*.6,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  for(const b of pBulls){ctx.save();ctx.translate(b.x,b.y);const a=Math.atan2(b.vy,b.vx);ctx.rotate(a);ctx.shadowColor='#00ffff';ctx.shadowBlur=10;ctx.fillStyle='#00eeff';ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,255,255,0.35)';ctx.beginPath();ctx.ellipse(-b.r*2.5,0,b.r*2,b.r*.5,0,0,Math.PI*2);ctx.fill();ctx.restore();}
}

// ── PLAYER BOAT — use PNG if loaded, else fallback ──
function drawBoat(){
  const bcx=boat.x+boat.w/2,bcy=boat.y+boat.h/2;
  ctx.save();ctx.translate(bcx,bcy);
  if(spinOn)ctx.rotate(spinA);
  if(boat.sink>0){const p=(70-boat.sink)/70;ctx.rotate(p*.65);ctx.globalAlpha=1-p*.85;}
  if(boat.sink>0||spinOn){const pulse=0.5+Math.sin(Date.now()*.04)*0.35;ctx.strokeStyle='rgba(255,30,0,'+pulse+')';ctx.lineWidth=7;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+10,boat.h/2+10,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(255,100,0,'+(pulse*0.5)+')';ctx.lineWidth=14;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+18,boat.h/2+18,0,0,Math.PI*2);ctx.stroke();}
  if(shOn){const pulse=0.6+Math.sin(Date.now()*.08)*0.3;ctx.strokeStyle='rgba(0,200,255,'+pulse+')';ctx.lineWidth=5;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+14,boat.h/2+14,0,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(100,255,255,'+(pulse*.45)+')';ctx.lineWidth=12;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+22,boat.h/2+22,0,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(0,200,255,'+(pulse*.1)+')';ctx.beginPath();ctx.ellipse(0,0,boat.w/2+22,boat.h/2+22,0,0,Math.PI*2);ctx.fill();}
  if(boat.inv>0&&boat.sink===0){
    const ip=boat.inv/INV,flicker=boat.inv<60&&Math.floor(Date.now()/75)%2===0;
    if(!flicker){const pulse=0.35+Math.sin(Date.now()*.05)*0.25;ctx.strokeStyle='rgba(0,230,255,'+Math.min(1,pulse*ip+0.25)+')';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,0,boat.w/2+12,boat.h/2+12,0,0,Math.PI*2);ctx.stroke();const sl=Math.ceil(boat.inv/60);ctx.fillStyle='rgba(0,230,255,'+ip+')';ctx.font='bold 12px Bangers,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('imm '+sl+'s',0,-boat.h/2-20);}
    ctx.globalAlpha=flicker?0.22:0.9;
  }
  ctx.translate(-boat.w/2,-boat.h/2);
  // Draw PNG boat if loaded
  if(boatLoaded&&imgBoat.naturalWidth>0){
    // The PNG has transparent background, scale to fit boat bounding box with some padding
    const scale=1.8;const dw=boat.w*scale,dh=boat.h*scale;
    ctx.drawImage(imgBoat,-(dw-boat.w)/2,-(dh-boat.h)/2,dw,dh);
  } else {
    dBoatFallback();
  }
  ctx.restore();
}

function dBoatFallback(){
  const t2=Date.now(),w=boat.w,h=boat.h,cx=w/2,cy=h/2;
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(cx+3,cy+h*.42,w/2-2,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d1f00';ctx.beginPath();ctx.ellipse(cx,cy,w/2,h/2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8B4513';ctx.beginPath();ctx.ellipse(cx,cy,w/2-2,h/2-2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a0522d';ctx.beginPath();ctx.ellipse(cx,cy+3,w/2-8,h/2-10,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#7a3b0f';ctx.lineWidth=1.2;for(let i=-3;i<=3;i++){const oy=cy+3+i*7;const hw2=Math.sqrt(Math.max(0,Math.pow((h/2-11),2)-Math.pow(oy-cy-3,2)))*(w/2-9)/(h/2-11);if(hw2>3){ctx.beginPath();ctx.moveTo(cx-hw2,oy);ctx.lineTo(cx+hw2,oy);ctx.stroke();}}
  ctx.strokeStyle='rgba(200,230,255,.4)';ctx.lineWidth=2;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(cx+(Math.sin(t2*.02+i)*5|0),h+i*3);ctx.lineTo(cx+(Math.sin(t2*.02+i+1)*4|0),h+i*3+5);ctx.stroke();}
}

function drawExps(){
  for(const e of exps){const al=e.life/e.maxLife;const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);g.addColorStop(0,'rgba(255,255,200,'+al+')');g.addColorStop(.3,'rgba(255,150,0,'+(al*.8)+')');g.addColorStop(.65,'rgba(200,50,0,'+(al*.5)+')');g.addColorStop(1,'rgba(40,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();if(al>.45){ctx.strokeStyle='rgba(255,255,100,'+(al*.65)+')';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(e.x,e.y,e.r*.6,0,Math.PI*2);ctx.stroke();}}
  for(const p of parts){ctx.globalAlpha=p.life/p.maxLife*(p.type==='smoke'?.38:1);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
}
function drawSavFX(){
  for(const e of savFX){ctx.globalAlpha=e.life/40;const col=e.pts===3?'#ff6600':e.pts===2?'#ffaa00':'#ffdd00';ctx.fillStyle=col;ctx.font='bold '+(12+e.pts*2)+'px Fredoka One,cursive';ctx.textAlign='center';ctx.fillText('+'+e.pts+'pt'+(e.pts>1?'s':'')+' +10s',e.x,e.y);ctx.globalAlpha=1;}
}
function drawHUD(){
  if(S&&S.time<=10&&S.running){ctx.fillStyle='rgba(255,0,0,'+(0.07+Math.sin(Date.now()*.015)*.05)+')';ctx.fillRect(0,0,W(),H());}
  const lv=getLv();
  ctx.fillStyle=isMS()?'rgba(255,60,60,.8)':'rgba(255,255,255,.55)';ctx.font='bold 11px monospace';ctx.textAlign='left';ctx.fillText(isMS()?'MORT SUBITE':'LVL '+lv,RL()+6,H()-22);
  if(!isMob&&lv>=6&&S&&S.running){ctx.fillStyle='rgba(0,200,255,0.6)';ctx.font='9px monospace';ctx.fillText('[X] Bouclier  [Espace] Tir',RL()+6,H()-8);}
  if(hasFranc){ctx.fillStyle='rgba(163,230,53,0.7)';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText('$FRANC bonus: '+nextFrancBonus+'pts',RR()-6,H()-8);}
  ctx.textAlign='left';
}
function loop(){
  ctx.save();if(shkD>0)ctx.translate((Math.random()-.5)*shk*2,(Math.random()-.5)*shk*2);
  drawScene();ctx.restore();
  if(S&&S.running)update();
  af=requestAnimationFrame(loop);
}
S={running:false,lives:MAX_LIVES,score:0,time:60,level:1};
boat=iB();objs=[];bulls=[];pBulls=[];exps=[];parts=[];savFX=[];keys={};scY=0;frN=0;narrowPassages=[];
ctx.fillStyle='#060410';ctx.fillRect(0,0,W(),H());
loop();
</script>
